<!DOCTYPE html>

<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover" />
  <meta name="theme-color" content="#0A5C5C" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>ROOM'S OPERASYON YÖNETİM SİSTEMİ - STABILIZED</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
:root {
      --brand: #0A5C5C;
      --brand-2: #0F7A7A;
      --brand-3: #064242;
      --brand-light: #E6F3F3;
      --brand-soft: rgba(10, 92, 92, 0.06);
      --brand-tint: #F1F8F8;
      --accent: #8B5CF6;
      --accent-light: #EDE9FE;
      --success: #059669;
      --warning: #D97706;
      --danger: #DC2626;
      --info: #2563EB;
      --ink: #111827;
      --ink-soft: #374151;
      --muted: #6B7280;
      --muted-light: #9CA3AF;
      --bg: #F9FAFB;
      --bg-2: #F3F4F6;
      --card: rgba(255,255,255,0.96);
      --card-solid: #FFFFFF;
      --line: #E5E7EB;
      --line-strong: #D1D5DB;
      --shadow-sm: 0 1px 2px rgba(17,24,39,.05);
      --shadow: 0 2px 8px rgba(17,24,39,.06);
      --shadow-md: 0 4px 12px rgba(17,24,39,.08);
      --shadow-lg: 0 12px 32px rgba(17,24,39,.10);
      --radius-xs: 10px;
      --radius-sm: 12px;
      --radius-md: 16px;
      --radius-lg: 20px;
      --header-h: 66px;
      --safe-top: env(safe-area-inset-top);
      --safe-bot: env(safe-area-inset-bottom);
      --safe-left: env(safe-area-inset-left);
      --safe-right: env(safe-area-inset-right);
      --font-ui: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-base: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-display: 'Manrope', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-mono: 'SF Mono', 'JetBrains Mono', ui-monospace, monospace;
    }

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  height: -webkit-fill-available;
  scroll-behavior: smooth;
}

body {
  min-height: 100vh;
  min-height: -webkit-fill-available;
  font-family: var(--font-base);
  background:
    radial-gradient(circle at top left, rgba(67,181,129,.14), transparent 26%),
    radial-gradient(circle at bottom right, rgba(35,156,102,.10), transparent 24%),
    linear-gradient(180deg, #F7FBF8 0%, var(--bg) 100%);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  line-height: 1.5;
  font-variant-numeric: tabular-nums;
}

.app {
  min-height: 100vh;
  min-height: -webkit-fill-available;
  padding: calc(var(--safe-top) + 72px) max(16px, var(--safe-right)) calc(var(--safe-bot) + 88px) max(16px, var(--safe-left));
  max-width: 1400px;
  margin: 0 auto;
  width: 100%;
}

@media (min-width: 768px) and (max-width: 1024px) {
  .app {
    padding: calc(var(--safe-top) + 76px) 24px calc(var(--safe-bot) + 92px) 24px;
  }
}

@media (min-width: 1025px) {
  .app {
    padding: calc(var(--safe-top) + 80px) 32px calc(var(--safe-bot) + 32px) 32px;
  }
}

@media (max-width: 480px) {
  .app {
    padding: calc(var(--safe-top) + 64px) 14px calc(var(--safe-bot) + 80px) 14px;
  }
}

.topbar {
  position: fixed;
  box-shadow: 0 8px 30px rgba(18,34,24,.05);
  top: 0;
  left: 0;
  right: 0;
  z-index: 50;
  background: rgba(255, 255, 255, 0.78);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--line);
  padding-top: var(--safe-top);
}

.topbarInner {
  max-width: 1400px;
  margin: 0 auto;
  padding: 8px max(16px, var(--safe-right)) 8px max(16px, var(--safe-left));
}

.topbarRow {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  height: 48px;
}

.topbarLeft {
  display: flex;
  align-items: center;
  gap: 8px;
}

.topbarRight {
  display: flex;
  align-items: center;
  gap: 8px;
}

.iconBtn {
  width: 44px;
  height: 44px;
  border-radius: 15px;
  border: 1px solid rgba(18,34,24,.08);
  background: linear-gradient(180deg, #ffffff, #fbfefc);
  box-shadow: var(--shadow-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.2s cubic-bezier(0.2, 0, 0, 1);
  font-size: 0;
  color: var(--ink);
  position: relative;
  overflow:hidden;
  flex-shrink: 0;
}

.iconBtn:active {
  transform: scale(0.94);
  background: var(--brand-light);
  border-color: var(--brand);
}

.iconBtn.qr-btn {
  background: linear-gradient(135deg, var(--brand), var(--brand-2));
  color: white;
  border: none;
  font-family: var(--font-display);
}

.iconBtn.qr-btn:active {
  opacity: 0.9;
}
.iconBtn svg, .navBtn svg, .navItem svg, .btn svg { width:18px; height:18px; stroke: currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; flex-shrink:0; }
.iconBtn svg{width:20px;height:20px;}
.uiIcon{width:1.1em;height:1.1em;display:inline-block;vertical-align:-0.18em;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}
.cardHead .h,.softPanelTitle,.heroTitle,.drawer .navItem,.btn,.iconBtn,.navBtn,.reportTab,.topMetricLabel,.topMetricValue,.searchIcon{display:flex;align-items:center;gap:8px;}
.report-tab-icon,.reportCardIcon,.heroIcon{display:inline-flex;align-items:center;justify-content:center;}
.bottomNav{padding-bottom:max(10px, env(safe-area-inset-bottom));}
.bottomNavInner{align-items:flex-end;}
.navBtn{min-height:58px;}
.navPlus{z-index:3;}
.topbarInner{padding-left:12px;padding-right:12px;}
.topbarRow{grid-template-columns:48px 1fr auto;}
.topbarRight{gap:10px;}
.heroIcon{min-width:52px;min-height:52px;}
.reportGrid svg.uiIcon,.report-tabs svg.uiIcon,.reportCard svg.uiIcon,.softPanel svg.uiIcon,.cardHead svg.uiIcon,.heroIcon svg.uiIcon{width:22px;height:22px;}
.reportGrid .uiIcon{width:28px;height:28px;}
.notifBell .notifCount{display:inline-flex;align-items:center;justify-content:center;}

.topbar,.bottomNav,.card,.softPanel,.notifPanel,.modalCard{backface-visibility:hidden;transform:translateZ(0);}
.btn,.iconBtn,.navItem,.filterChip,.pill,.badge{will-change:transform,box-shadow,background-color,border-color;}
.btn,.input,select,textarea{font-family:var(--font-base);}
.btn{border-radius:14px;font-weight:700;letter-spacing:-.01em;}
.pill,.badge,.status-badge,.kategori-tag{border-radius:999px;}
.analizTablo table,.table{font-variant-numeric:tabular-nums;}
.analizTablo th,.analizTablo td{vertical-align:middle;}
.empty-state{padding:22px;border:1px dashed rgba(18,34,24,.12);border-radius:18px;background:linear-gradient(180deg,#fff,var(--brand-soft));color:var(--muted);}
.heroIcon,.notifGlyph{box-shadow:inset 0 1px 0 rgba(255,255,255,.7),0 8px 20px rgba(18,34,24,.06);}
@media (hover:hover){
  .iconBtn:hover,.btn:hover,.navItem:hover,.deptBtn:hover,.orderCard:hover,.material-card:hover,.financeCard:hover{transform:translateY(-1px);box-shadow:var(--shadow);}
  .navBtn:hover{background:rgba(255,255,255,.74);}
}

.brandCenter {
  display: flex;
  align-items: center;
  justify-content: center;
  flex: 1;
  min-width: 0;
}

.brandMark {
  display:flex;align-items:center;gap:12px;padding:8px 14px;border-radius:999px;
  font-family: var(--font-display);
  font-weight: 800;
  font-size: clamp(16px, 3vw, 18px);
  letter-spacing: -0.02em;
  color: var(--ink);
  background: linear-gradient(180deg, rgba(255,255,255,.96), rgba(255,255,255,.84));
  border:1px solid rgba(67,181,129,.18);
  box-shadow: var(--shadow-sm);
  white-space: nowrap;
}
.brandMark strong{font-family:var(--font-display);font-weight:800;letter-spacing:-.03em;}
.brandMark small{display:block;font-size:11px;line-height:1;color:var(--muted);font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-top:2px;}
.brandDot{width:12px;height:12px;border-radius:999px;background:linear-gradient(135deg,var(--brand),var(--brand-2));box-shadow:0 0 0 6px var(--brand-soft);flex-shrink:0;}

.bottomNav {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;
  z-index: 50;
  background: rgba(255, 255, 255, 0.78);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-top: 1px solid var(--line);
  padding: 8px max(8px, var(--safe-right)) calc(8px + var(--safe-bot)) max(8px, var(--safe-left));
}

.bottomNavInner {
  max-width: 600px;
  margin: 0 auto;
  display: flex;
  align-items: flex-end;
  justify-content: space-around;
  gap: 4px;
}

.navBtn {
  flex: 1;
  height: 56px;
  border: none;
  background: transparent;
  color: var(--muted);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  justify-content: center;
  gap: 4px;
  font-weight: 600;
  font-size: 11px;
  border-radius: 16px;
  cursor: pointer;
  transition: all 0.2s ease;
  padding: 8px 4px;
}

.navBtn:active {
  background: var(--brand-light);
  transform: scale(0.96);
}

.navBtn.active {
  color: var(--brand-2);
  background: var(--brand-light);
}

.navBtn span {
  font-size: 11px;
  font-weight: 600;
}

.navBtn svg{width:18px;height:18px;}
.navBtn.active, .navBtn[aria-current="page"]{color:var(--brand-3); background:var(--brand-soft);}
.navPlus {
  width: 52px;
  height: 52px;
  border-radius: 18px;
  border: none;
  background: linear-gradient(135deg, var(--brand), var(--brand-2));
  color: white;
  box-shadow: 0 4px 12px rgba(47, 174, 116, 0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  transform: translateY(-8px);
  cursor: pointer;
  transition: all 0.2s ease;
  font-size: 24px;
  flex-shrink: 0;
}

.navPlus:active {
  transform: translateY(-6px) scale(0.94);
  box-shadow: 0 6px 16px rgba(47, 174, 116, 0.4);
}

@media (min-width: 820px) {
  .bottomNav {
    display: none;
  }
}

@media (max-width: 380px) {
  .navBtn {
    font-size: 0;
  }
  .navBtn span {
    display: none;
  }
}

.card {
  background: linear-gradient(180deg, rgba(255,255,255,.96), rgba(255,255,255,.9));
  border: 1px solid rgba(67,181,129,.10);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
  transition: all 0.3s ease;
  margin-bottom: 16px;
}

.cardHead {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 18px 12px;
  border-bottom: 1px solid var(--line);
}

.cardHead .h {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--font-display);
  font-weight: 800;
  font-size: clamp(16px, 4vw, 18px);
}

.cardBody {
  padding: 18px;
}

.btn {
  height: 48px;
  padding: 0 18px;
  border-radius: 15px;
  border: 1px solid rgba(18,34,24,.08);
  background: linear-gradient(180deg, #ffffff, #fbfefc);
  font-weight: 700;
  color: var(--ink);
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  white-space: nowrap;
  transition: all 0.2s ease;
  font-size: 15px;
  box-shadow: var(--shadow-sm);
}

.btn:active {
  transform: scale(0.96);
  background: var(--brand-light);
  border-color: var(--brand);
}

.btn.primary {
  background: linear-gradient(135deg, var(--brand), var(--brand-2));
  color: white;
  border: none;
  font-family: var(--font-display);
  box-shadow: 0 4px 12px rgba(47, 174, 116, 0.25);
}

.btn.primary:active {
  opacity: 0.9;
  transform: scale(0.96);
  box-shadow: 0 6px 16px rgba(47, 174, 116, 0.35);
}

.btn.danger {
  background: linear-gradient(135deg, #ff4444, #cc0000);
  color: white;
  border: none;
}

.btn.small {
  height: 38px;
  padding: 0 14px;
  font-size: 13px;
}

.fieldGrid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 16px;
  margin-bottom: 16px;
}

label {
  display: block;
  font-weight: 600;
  color: var(--muted);
  font-size: 13px;
  margin-bottom: 6px;
  letter-spacing: 0.3px;
}

.input, select, textarea {
  width: 100%;
  height: 48px;
  padding: 0 14px;
  border-radius: 14px;
  border: 1.5px solid var(--line);
  background: #fff;
  font-size: 15px;
  outline: none;
  transition: all 0.2s ease;
  font-family: inherit;
}

textarea.input {
  height: 100px;
  padding: 12px 14px;
  resize: vertical;
}

.input:focus, select:focus, textarea:focus {
  border-color: var(--brand);
  box-shadow: 0 0 0 4px var(--brand-light);
}

.financeGrid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 14px;
  margin-bottom: 16px;
}

.financeCard {
  background: linear-gradient(145deg, #fff, #fafafa);
  border: 1px solid var(--line);
  border-radius: 18px;
  padding: 16px;
  transition: all 0.2s ease;
}

.financeCard .label {
  font-weight: 600;
  color: var(--muted);
  font-size: 13px;
  margin-bottom: 6px;
}

.financeCard .value {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: clamp(22px, 5vw, 30px);
  line-height: 1.2;
  color: var(--ink);
}

.variant-list {
  margin-top: 12px;
  padding-left: 16px;
  border-left: 2px solid var(--brand-light);
}

.variant-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px dashed var(--line);
}

.variant-item:last-child {
  border-bottom: none;
}

.variant-badge {
  background: var(--brand-soft);
  color: var(--brand-2);
  padding: 4px 10px;
  border-radius: 30px;
  font-size: 12px;
  font-weight: 600;
}

.critical-warning {
  color: #ff4444;
  font-weight: 800;
  background: #ffe5e5;
  padding: 2px 8px;
  border-radius: 12px;
  font-size: 11px;
}

.material-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 16px;
  margin: 20px 0;
}

.material-card {
  border: 1px solid var(--line);
  border-radius: 18px;
  background: linear-gradient(180deg, rgba(255,255,255,.96), rgba(255,255,255,.92));
  padding: 18px;
  position:relative;
  transition: all 0.2s ease;
}

.material-card.critical-row {
  border-color: #ff4444;
  background: #fff5f5;
}

.warning-badge {
  background: #ff4444;
  color: white;
  padding: 4px 10px;
  border-radius: 30px;
  font-size: 12px;
  font-weight: 700;
  border-radius:18px;
  display: inline-block;
  margin-top: 10px;
}

.report-tabs {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 24px;
  padding: 4px;
  background: var(--brand-soft);
  border-radius: 40px;
}

.report-tab {
  padding: 10px 18px;
  border-radius: 30px;
  border: none;
  background: transparent;
  font-weight: 600;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s ease;
  color: var(--muted);
  flex: 1 1 auto;
  white-space: nowrap;
}

.report-tab.active {
  background: var(--card);
  color: var(--brand-2);
  box-shadow: var(--shadow-sm);
}

.summary-stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 16px;
  margin: 20px 0;
}

.stat-card {
  background: linear-gradient(135deg, var(--brand), var(--brand-2));
  color: white;
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 8px 20px rgba(47, 174, 116, 0.2);
}

.stat-card .stat-label {
  font-size: 14px;
  opacity: 0.9;
  margin-bottom: 6px;
}

.stat-card .stat-value {
  font-size: clamp(24px, 6vw, 32px);
  font-weight: 900;
  line-height: 1.2;
}

.list {
  display: grid;
  gap: 14px;
}

.orderCard {
  border: 1px solid var(--line);
  border-radius: 20px;
  background: linear-gradient(180deg, rgba(255,255,255,.96), rgba(255,255,255,.92));
  padding: 18px;
  position:relative;
  transition: all 0.2s ease;
}

.orderCard::before {content:'';position:absolute;left:18px;right:18px;top:0;height:4px;border-radius:0 0 10px 10px;background:linear-gradient(90deg,var(--brand),rgba(67,181,129,.16));}
.orderCard:hover {
  box-shadow: var(--shadow-lg);
  transform: translateY(-2px);
}

.orderTop {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
}

.orderTitle {
  font-weight: 800;
  font-size: 16px;
  color: var(--ink);
}

.orderSub {
  color: var(--muted);
  font-weight: 500;
  margin-top: 6px;
  font-size: 14px;
}

.badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 6px 14px;
  border-radius: 30px;
  font-weight: 700;
  font-size: 13px;
  white-space: nowrap;
}
.badge.status-siparis-alindi { background: #e3f2fd; color: #0d47a1; }
.badge.status-iskelette { background: #fff3e0; color: #e65100; }
.badge.status-beyazlamada { background: #fff8e1; color: #f57f17; }
.badge.status-konfeksiyonda { background: #fffde7; color: #fbc02d; }
.badge.status-dosemede { background: #f3e5f5; color: #4a148c; }
.badge.status-montaj-paket { background: #fce4ec; color: #880e4f; }
.badge.status-sevkiyata-hazir { background: #e8f5e9; color: #1b5e20; }
.badge.status-sevk-edildi { background: #c8e6c9; color: #1b5e20; }

.orderMeta {
  margin-top: 14px;
  display: grid;
  gap: 6px;
  color: var(--muted);
  font-weight: 500;
  font-size: 14px;
}

.noteBox {
  margin-top: 14px;
  border: 1px dashed var(--brand);
  background: var(--brand-soft);
  border-radius: 14px;
  padding: 12px 14px;
  font-size: 14px;
  color: var(--ink-soft);
}

.orderActions {
  margin-top: 16px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.orderActions .btn {
  flex: 1 1 auto;
  min-width: 80px;
}

.deptGrid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 10px;
  margin-bottom: 16px;
}

.deptBtn {
  height: 56px;
  border-radius: 18px;
  border: 1px solid var(--line);
  background: linear-gradient(180deg, rgba(255,255,255,.96), rgba(255,255,255,.9));
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s ease;
  font-size: 14px;
  padding: 0 12px;
}

.deptBtn.active {
  background: var(--brand-light);
  border-color: var(--brand);
  color: var(--brand-2);
}

.deptBadge {
  min-width: 26px;
  height: 26px;
  padding: 0 8px;
  border-radius: 30px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 800;
  background: var(--brand-light);
  color: var(--brand-2);
}

.deptBtn.active .deptBadge {
  background: var(--brand);
  border-color: var(--brand-3);
  color: white;
}

.analizTablo {
  overflow-x: auto;
  border-radius: 18px;
  border: 1px solid var(--line);
  background: #fff;
  margin: 16px 0;
}

table {
  width: 100%;
  border-collapse: collapse;

.toast {

        try {
          const encoder = new TextEncoder();
          const data = encoder.encode(password);
          const hash = await crypto.subtle.digest('SHA-256', data);
          return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');

          return 'plain:' + password;
        }
      };

            changed = true;

        if (changed) saveUsers();

      const repairBrokenIconText = (root = document.body) => {
        if (!root) return;
        const patterns = [
          /'\s*\+\s*icon\("([^"]+)"\)\s*\+\s*'/g,
          /\$\{\s*icon\("([^"]+)"\)\s*\}/g,
          /(?<![\w$])icon\("([^"]+)"\)(?![\w$])/g
        ];
        const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
        const nodes = [];
        let node;
        while ((node = walker.nextNode())) {
          const value = node.nodeValue || '';
          if (patterns.some((rx) => rx.test(value))) nodes.push(node);
          patterns.forEach((rx) => rx.lastIndex = 0);
        }
        nodes.forEach((textNode) => {
          let value = textNode.nodeValue || '';
          if (!value) return;
          const frag = document.createDocumentFragment();
          let cursor = 0;
          const matches = [];
          patterns.forEach((rx) => {
            rx.lastIndex = 0;
            let m;
            while ((m = rx.exec(value))) matches.push({ start: m.index, end: m.index + m[0].length, name: m[1] });
          });
          matches.sort((a,b)=>a.start-b.start);
          const filtered = [];
          for (const m of matches) {
            if (!filtered.length || m.start >= filtered[filtered.length-1].end) filtered.push(m);
          }
          filtered.forEach((m) => {
            if (m.start > cursor) frag.appendChild(document.createTextNode(value.slice(cursor, m.start)));
            const wrap = document.createElement('span');
            wrap.className = 'iconFix';
            wrap.innerHTML = icon(m.name) || '';
            while (wrap.firstChild) frag.appendChild(wrap.firstChild);
            const nextChar = value[m.end] || '';
            if (nextChar && !/^\s|[.,;:!?)}\]]$/.test(nextChar)) frag.appendChild(document.createTextNode(' '));
            cursor = m.end;
          });
          if (cursor < value.length) frag.appendChild(document.createTextNode(value.slice(cursor)));
          textNode.parentNode && textNode.parentNode.replaceChild(frag, textNode);
        });
      };

      const toISO = (d) => {
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        return `${y}-${m}-${day}`;
      };

      const fromISO = (iso) => {
        const [y, m, d] = iso.split('-').map(Number);
        return new Date(y, m - 1, d, 12);
      };

      const sameDayISO = (value, isoDate) => {
        if (!value || !isoDate) return false;
        if (typeof value === 'string') {
          if (/^\d{4}-\d{2}-\d{2}$/.test(value)) return value === isoDate;
          const parsed = new Date(value);
          if (!Number.isNaN(parsed.getTime())) return toISO(parsed) === isoDate;
          return String(value).slice(0, 10) === isoDate;
        }
        if (value instanceof Date && !Number.isNaN(value.getTime())) return toISO(value) === isoDate;
        return false;
      };

        const day = d.getDay();
        const diff = day === 0 ? -6 : 1 - day;
        d.setDate(d.getDate() + diff);
        return d;
      };

      function buildEmptyStageProgress() {
        return {
          iskelet: { startedAt: null, completedAt: null },
          beyazlama: { startedAt: null, completedAt: null },
          konf: { startedAt: null, completedAt: null },
          doseme: { startedAt: null, completedAt: null },
          montaj: { startedAt: null, completedAt: null },
          depo: { startedAt: null, completedAt: null }
        };
      }

      function mapLegacyStatusToStageProgress(order) {
        const sp = buildEmptyStageProgress();
        const markDone = (key) => { sp[key].startedAt = order.orderDate || todayISO(); sp[key].completedAt = order.orderDate || todayISO(); };
        const markActive = (key) => { sp[key].startedAt = order.orderDate || todayISO(); };
        switch (order.status) {
          case 'Sevk Edildi':
            ['iskelet','beyazlama','konf','doseme','montaj','depo'].forEach(markDone);
            break;
          case 'Depo & Lojistik':
          case 'Sevkiyata Hazır':
            ['iskelet','beyazlama','konf','doseme','montaj'].forEach(markDone);
            sp.depo.startedAt = order.factoryCompletedAt || order.orderDate || todayISO();
            break;
          case 'Montaj & Paket':
            ['iskelet','beyazlama','konf','doseme'].forEach(markDone);
            markActive('montaj');
            break;
          case 'Döşemede':
            ['iskelet','beyazlama','konf'].forEach(markDone);
            markActive('doseme');
            break;
          case 'Döşemeye Hazır':
            ['iskelet','beyazlama','konf'].forEach(markDone);
            break;
          case 'Konfeksiyon Havuzunda':
            ['konf'].forEach(markDone);
            if (order.stageProgress?.iskelet?.completedAt) markDone('iskelet');
            if (order.stageProgress?.beyazlama?.completedAt) markDone('beyazlama');
            break;
          case 'Konfeksiyonda':
            markActive('konf');
            break;
          case 'Beyazlamada':
            markDone('iskelet');
            markActive('beyazlama');
            break;
          case 'İskelette':
            markActive('iskelet');
            break;
          default:
            break;
        }
        return sp;
      }

      function normalizeOrderRecord(order) {
        const normalized = {
          ...order,
          orderType: order.orderType || (order.customer || order.dealerName ? 'siparis' : 'stok'),
          adet: Number(order.adet || 1),
          birimFiyat: Number(order.birimFiyat || (order.price ? order.price / (order.adet || 1) : 0) || 0),
          price: Number(order.price || 0),
          partCount: Number(order.partCount || CONSTANTS.PRODUCT_PARTS[order.productType] || 1),
          shippingAddress: order.shippingAddress || '',
          phone: order.phone || '',
          customer: order.customer || '',
          dealerName: order.dealerName || '',
          note: order.note || '',
          stageProgress: order.stageProgress && typeof order.stageProgress === 'object' ? order.stageProgress : mapLegacyStatusToStageProgress(order),
          factoryCompletedAt: order.factoryCompletedAt || null,
          shippedAt: order.shippedAt || null
        };
        const keys = ['iskelet','beyazlama','konf','doseme','montaj','depo'];
        keys.forEach((key) => {
          if (!normalized.stageProgress[key]) normalized.stageProgress[key] = { startedAt: null, completedAt: null };
          normalized.stageProgress[key].startedAt = normalized.stageProgress[key].startedAt || null;
          normalized.stageProgress[key].completedAt = normalized.stageProgress[key].completedAt || null;
        });
        if (!normalized.factoryCompletedAt && normalized.stageProgress.montaj.completedAt) {
          normalized.factoryCompletedAt = normalized.stageProgress.montaj.completedAt.slice(0, 10);
        }
        if (normalized.shippedAt && !normalized.stageProgress.depo.completedAt) {
          normalized.stageProgress.depo.startedAt = normalized.stageProgress.depo.startedAt || `${normalized.shippedAt}T12:00:00`;
          normalized.stageProgress.depo.completedAt = normalized.stageProgress.depo.completedAt || `${normalized.shippedAt}T12:00:00`;
        }
        return normalized;
      }

              ...o,
              statusHistory: Array.isArray(o.statusHistory) ? o.statusHistory : []
            }));

            (migrated.materials || []).forEach(m => {
              (m.variants || []).forEach(v => { if (v.unitCost == null) v.unitCost = 0; });
            });
            migrated.schemaVersion = 3;
          }
          if (version < 4) {
            migrated.accounts = migrated.accounts || [];
            migrated.accountTransactions = migrated.accountTransactions || [];
            migrated.cashTransactions = migrated.cashTransactions || [];
            migrated.allocations = migrated.allocations || [];
            migrated.schemaVersion = 4;
          }

            settings: { ...defaultState.settings, ...(migrated.settings || {}) },

        const canViewNotifications = !!currentUser && hasPermission('bildirim.goruntule');
        elements.btnNotifications.style.display = canViewNotifications ? 'inline-flex' : 'none';
        if (!canViewNotifications) {
          elements.notifCount.style.display = 'none';
          elements.notifPanel.classList.remove('show');
          return;
        }
        const unread = getMyNotifications().filter(n => !n.readBy.includes(currentUser?.id)).length;
        elements.notifCount.textContent = String(unread);
        elements.notifCount.style.display = unread ? 'flex' : 'none';
      };
            const renderNotifications = () => {
        if (!elements.notifList) return;
        if (!currentUser || !hasPermission('bildirim.goruntule')) {
          elements.notifList.innerHTML = '<div class="empty-state">Bildirimleri görüntüleme yetkiniz yok.</div>';
          return;
        }
        const allList = getMyNotifications();
        const activeFilter = state._notifFilter || 'all';
        const list = allList.filter(n => activeFilter === 'all' ? true : n.type === activeFilter);

        const filters = [
          ['all', `Tümü (${allList.length})`],
          ['info', `Bilgi (${allList.filter(n => n.type === 'info').length})`],
          ['warning', `Uyarı (${allList.filter(n => n.type === 'warning').length})`],
          ['error', `Hata (${allList.filter(n => n.type === 'error').length})`],
          ['success', `Başarı (${allList.filter(n => n.type === 'success').length})`]
        ];

        if (!allList.length) {
          elements.notifList.innerHTML = `
            <div class="notifFilterBar">
              ${filters.map(([key,label]) => `<button class="filterChip ${activeFilter===key?'active':''}" data-filter="${key}">${label}</button>`).join('')}
            </div>
            <div class="empty-state">Bildirim yok.</div>
          `;
        } else {
          elements.notifList.innerHTML = `
            <div class="notifFilterBar">
              ${filters.map(([key,label]) => `<button class="filterChip ${activeFilter===key?'active':''}" data-filter="${key}">${label}</button>`).join('')}
            </div>
            <div class="list">
              ${list.map(n => {
                const unread = !n.readBy.includes(currentUser?.id);
                const glyph = n.type === 'success' ? icon('success') : n.type === 'warning' ? icon('alert') : n.type === 'error' ? icon('error') : icon('info');
                const typeLabel = n.type === 'success' ? 'Başarı' : n.type === 'warning' ? 'Uyarı' : n.type === 'error' ? 'Hata' : 'Bilgi';
                return `
                  <div class="notifCard ${unread ? 'unread' : ''}">
                    <div class="notifCardTop">
                      <div>
                        <div class="notifTitleRow">
                          <span class="notifGlyph">${glyph}</span>
                          <div>
                            <div class="notifHeadline">${esc(n.title || 'Bildirim')}</div>
                            <div class="notifTime">${typeLabel} · ${esc(relativeDateTime(n.createdAt))}</div>
                          </div>
                        </div>
                      </div>
                      ${unread ? '<span class="pill">Yeni</span>' : '<span class="pill">Okundu</span>'}
                    </div>
                    <div class="notifMessage">${esc(n.message || '')}</div>
                    <div class="notifActions">
                      ${unread && hasPermission('bildirim.okundu') ? `<button class="btn small" data-act="readNotif" data-id="${n.id}">Okundu yap</button>` : ''}
                      ${n.relatedOrderId ? `<button class="btn small" data-act="gotoNotifOrder" data-id="${n.relatedOrderId}">Siparişi aç</button>` : ''}
                    </div>
                  </div>`;
              }).join('') || '<div class="empty-state">Bu filtre için bildirim yok.</div>'}
            </div>
          `;
        }

        elements.notifList.querySelectorAll('[data-filter]').forEach(btn => btn.onclick = () => {
          state._notifFilter = btn.dataset.filter;
          renderNotifications();
        });
        elements.notifList.querySelectorAll('[data-act="readNotif"]').forEach(btn => btn.onclick = () => markNotificationRead(btn.dataset.id));
        elements.notifList.querySelectorAll('[data-act="gotoNotifOrder"]').forEach(btn => btn.onclick = () => {
          elements.notifPanel.classList.remove('show');
          if (canAccessView('orders')) {
            setView('orders');
            setTimeout(() => showOrderDetail(btn.dataset.id), 60);
          }
        });
      };
      loadNotifications();

      const canAccessView = (viewName) => {
        const map = {
          home: 'panel.anasayfa',
          orders: 'menu.siparisler',
          department: 'menu.departman',
          finance: 'menu.finans',
          materials: 'menu.hammaddeler',
          reports: 'menu.raporlar',
          hr: 'ik.goruntule',
          settings: 'menu.ayarlar',
          admin: 'menu.admin'
        };
        return !map[viewName] || hasPermission(map[viewName]);
      };

      const getRoleBadge = (user = currentUser) => {
        if (!user) return '';
        return `${user.role}${user.subRole ? ' / ' + user.subRole : ''}${user.department ? ' / ' + user.department : ''}`;
      };

      const t = (key) => TRANSLATIONS[currentLanguage]?.[key] || key;

      const formatDate = (iso) => {
        if (!iso) return '';
        const d = fromISO(iso);
        return d.toLocaleDateString('tr-TR', { year: 'numeric', month: 'long', day: 'numeric' });
      };

      const formatDateShort = (iso) => {
        if (!iso) return '';
        const d = fromISO(iso);
        return d.toLocaleDateString('tr-TR', { day: 'numeric', month: 'numeric', year: 'numeric' });
      };

      const shortDate = (iso) => {
        if (!iso) return '';
        const d = fromISO(iso);
        return d.toLocaleDateString('tr-TR', { month: '2-digit', day: '2-digit' });
      };

      const isWeekend = (d) => d.getDay() === 0 || d.getDay() === 6;

      const parseHolidays = () => {
        return new Set((state.settings.holidaysText || '')
          .split('\n')
          .map(s => s.trim())
          .filter(s => /^\d{4}-\d{2}-\d{2}$/.test(s)));
      };

      const isWorkday = (d, holidays) => !isWeekend(d) && !holidays.has(toISO(d));

      const addWorkdays = (baseDate, workdays, holidays) => {
        let d = new Date(baseDate);
        let left = workdays;
        while (left > 0) {
          d = addDays(d, 1);
          if (isWorkday(d, holidays)) left--;
        }
        return d;
      };

      const stageRange = (orderDateISO, fromW, toW) => {
        const holidays = parseHolidays();
        const od = fromISO(orderDateISO);
        return {
          startISO: toISO(addWorkdays(od, fromW, holidays)),
          endISO: toISO(addWorkdays(od, toW, holidays))
        };
      };

      const stageForDeptKey = (key) => stages.find(s => s.key === key) || stages[0];

      const computePoints = (productType, model) => {
        const base = productPoints[productType] || 0;

        if (productType === 'Berjer') {
          if (model === 'Loft') return 50;
          if (model === 'Elis') return 60;
          if (['Step', 'Norm', 'Loki'].includes(model)) return 40;
          return 40;
        }

        if (productType === 'Kanepe') {
          if (model === 'Loki') return 80;
          if (model === 'Bold') return 60;
          return 80;
        }

        return base;
      };

      const colorsFor = (productType, model) => {
        if (!model) return [];
        if (productType === 'Mini Puf') {
          const base = (modelColors[model] || ['Özel']).slice();
          return [...new Set([...base, 'Desen', 'Özel'])];
        }
        if (productType === 'İskandinav') return modelColors['İskandinav'] || ['Desen', 'Özel'];
        return modelColors[model] || ['Özel'];
      };

      const isDone = (o) => !!o.shippedAt;

      const stageStarted = (order, key) => !!order?.stageProgress?.[key]?.startedAt;
      const stageCompleted = (order, key) => !!order?.stageProgress?.[key]?.completedAt;

      const stageReady = (order, key) => {
        switch (key) {
          case 'iskelet': return !stageCompleted(order, 'iskelet');
          case 'konf': return !stageCompleted(order, 'konf');
          case 'beyazlama': return stageCompleted(order, 'iskelet') && !stageCompleted(order, 'beyazlama');
          case 'doseme': return stageCompleted(order, 'beyazlama') && stageCompleted(order, 'konf') && !stageCompleted(order, 'doseme');
          case 'montaj': return stageCompleted(order, 'doseme') && !stageCompleted(order, 'montaj');
          case 'depo': return stageCompleted(order, 'montaj') && !!order.factoryCompletedAt && !order.shippedAt;
          default: return false;
        }
      };

      const getOrderPoints = (order) => computePoints(order.productType, order.model) * (order.adet || 1);

      const deriveOrderDisplayStatus = (order) => {
        if (order.shippedAt) return 'Sevk Edildi';
        if (order.factoryCompletedAt) return 'Depo & Lojistik';
        if (stageStarted(order, 'montaj') || stageCompleted(order, 'montaj')) return 'Montaj & Paket';
        if (stageStarted(order, 'doseme') || stageCompleted(order, 'doseme')) return 'Döşemede';
        if (stageReady(order, 'doseme') && !stageStarted(order, 'doseme')) return 'Döşemeye Hazır';
        if (stageCompleted(order, 'konf') && !stageCompleted(order, 'beyazlama')) return 'Konfeksiyon Havuzunda';
        if (stageStarted(order, 'beyazlama') || stageCompleted(order, 'beyazlama')) return 'Beyazlamada';
        if (stageStarted(order, 'konf') || stageCompleted(order, 'konf')) return 'Konfeksiyonda';
        if (stageStarted(order, 'iskelet') || stageCompleted(order, 'iskelet')) return 'İskelette';
        return 'Sipariş Alındı';
      };

      const updateOrderComputedStatus = (order) => {
        const newStatus = deriveOrderDisplayStatus(order);
        if (newStatus !== order.status) {
          if (!Array.isArray(order.statusHistory)) order.statusHistory = [];
          order.statusHistory.push({
            status: newStatus,
            prevStatus: order.status || '',
            date: todayISO(),
            at: new Date().toISOString(),
            by: currentUser?.username || 'system'
          });
        }
        order.status = newStatus;
        return order.status;
      };

      const pushAcceptedTaskEntry = (order, deptKey, stageName) => {
        const exists = (acceptedTasks || []).some(task => task.orderId === order.id && task.dept === deptKey);
        if (exists) return;
        acceptedTasks.push({
          id: `acc_${Date.now()}_${Math.random().toString(16).slice(2)}`,
          userId: currentUser?.id || 'system',
          username: currentUser?.username || 'system',
          dept: deptKey,
          stage: stageName,
          date: todayISO(),
          points: getOrderPoints(order),
          orderId: order.id,
          orderNo: order.no,
          acceptedAt: new Date().toISOString()
        });
      };

      const markStageStarted = (order, deptKey) => {
        if (!stageReady(order, deptKey)) return { ok: false, message: 'Bu aşama henüz hazır değil.' };
        order.stageProgress[deptKey] = order.stageProgress[deptKey] || {};
        if (stageStarted(order, deptKey)) return { ok: false, message: 'Bu iş zaten kabul edilmiş.' };
        const nowIso = new Date().toISOString();
        order.stageProgress[deptKey].startedAt = nowIso;
        order.stageProgress[deptKey].acceptedAt = nowIso;
        order.stageProgress[deptKey].acceptedBy = currentUser?.username || 'system';
        order.stageProgress[deptKey].acceptedById = currentUser?.id || 'system';
        pushAcceptedTaskEntry(order, deptKey, stageForDeptKey(deptKey)?.name || deptKey);
        updateOrderComputedStatus(order);
        return { ok: true, message: 'İş kabul edildi.' };
      };

      const pushCompletedTaskEntry = (order, deptKey, stageName) => {
        completedTasks.push({
          userId: currentUser?.id || 'system',
          username: currentUser?.username || 'system',
          dept: deptKey,
          stage: stageName,
          date: todayISO(),
          points: getOrderPoints(order),
          orderId: order.id,
          orderNo: order.no,
          dealerName: order.dealerName || '',
          orderType: order.orderType || 'siparis'
        });
      };

      const completeDepartmentStage = (order, deptKey) => {
        if (!stageReady(order, deptKey)) return { ok: false, message: 'Bu aşama henüz hazır değil.' };
        order.stageProgress[deptKey] = order.stageProgress[deptKey] || {};
        if (!stageStarted(order, deptKey)) return { ok: false, message: 'Tamamlamadan önce iş kabul edilmelidir.' };
        if (stageCompleted(order, deptKey)) return { ok: false, message: 'Bu aşama zaten tamamlandı.' };
        const acceptedById = order.stageProgress[deptKey].acceptedById || null;
        if (acceptedById && currentUser?.id && acceptedById !== currentUser.id && !(currentUser?.role === 'Yönetim' || currentUser?.role === 'Operasyon')) {
          return { ok: false, message: 'Bu iş başka bir personel tarafından kabul edilmiş.' };
        }
        const consumptionsForDept = state.consumptions.filter(c =>
          c.dept === deptKey && c.productType === order.productType && c.model === order.model
        );
        const stockShortages = [];
        consumptionsForDept.forEach(c => {
          const mat = state.materials.find(m => (m.variants || []).some(v => v.id === c.variantId));
          const variant = mat?.variants?.find(v => v.id === c.variantId);
          const totalQty = Math.round((Number(c.qty || 0) * Number(order.adet || 1)) * 1000) / 1000;
          if (variant && Number(variant.stock || 0) < totalQty) {
            stockShortages.push({ mat, variant, totalQty });
          }
        });
        if (stockShortages.length) {
          stockShortages.forEach(({ mat, variant, totalQty }) => pushNotification({
            type: 'error',
            title: 'Yetersiz Stok',
            message: `${mat.name} / ${variant.name}: Stokta ${Number(variant.stock || 0).toFixed(2)} ${mat.unit || ''} var, ${totalQty.toFixed(2)} gerekiyor. İşlem durduruldu.`,
            targetUserIds: buildRoleTargetUsers(['Yönetim','Muhasebe'], ['Satınalma','Stok Yönetimi'])
          }));
          return { ok: false, message: 'Yetersiz stok nedeniyle aşama tamamlanmadı.' };
        }
        const nowIso = new Date().toISOString();
        order.stageProgress[deptKey].completedAt = nowIso;
        order.stageProgress[deptKey].completedBy = currentUser?.username || 'system';
        order.stageProgress[deptKey].completedById = currentUser?.id || 'system';
        pushCompletedTaskEntry(order, deptKey, stageForDeptKey(deptKey)?.name || deptKey);

        consumptionsForDept.forEach(c => {
          const mat = state.materials.find(m => m.variants.some(v => v.id === c.variantId));
          if (mat) {
            const variant = mat.variants.find(v => v.id === c.variantId);
            if (variant) {
              const totalQty = Math.round((c.qty * Number(order.adet || 1)) * 1000) / 1000;
              variant.stock = Math.round((Number(variant.stock || 0) - totalQty) * 1000) / 1000;
              state.stockMovements.push({
                variantId: c.variantId, materialId: mat.id,
                qty: -totalQty, date: todayISO(),
                note: `${order.no} üretim tüketimi (${stageForDeptKey(deptKey)?.name || deptKey})`,
                type: 'üretim'
              });
              if (variant.stock <= variant.critical) {
                pushNotification({
                  type: 'warning',
                  title: 'Kritik Stok Uyarısı',
                  message: `${mat.name} / ${variant.name}: Stok ${variant.stock.toFixed(2)} ${mat.unit} — Kritik seviyenin altında!`,
                  targetUserIds: buildRoleTargetUsers(['Yönetim','Muhasebe'], ['Satınalma'])
                });
              }
            }
          }
        });
        if (deptKey === 'montaj') {
          order.factoryCompletedAt = nowIso.slice(0, 10);
          order.stageProgress.depo = order.stageProgress.depo || {};
          order.stageProgress.depo.startedAt = order.stageProgress.depo.startedAt || nowIso;
        }
        updateOrderComputedStatus(order);
        return { ok: true, message: 'Aşama tamamlandı.' };
      };

      const assignStockOrderToDealer = (orderId, values) => {
        const order = state.orders.find(o => o.id === orderId);
        if (!order) return false;
        order.customer = (values.customer || '').trim();
        order.dealerName = (values.dealerName || '').trim();
        order.phone = (values.phone || order.phone || '').trim();
        order.shippingAddress = (values.shippingAddress || order.shippingAddress || '').trim();
        updateOrderComputedStatus(order);
        commitUi({ notify: false, message: 'Stok siparişi bayi/cariye atandı.' });
        return true;
      };

      const shipOrder = (orderId) => {
        const order = state.orders.find(o => o.id === orderId);
        if (!order) return;
        if (!order.factoryCompletedAt) return toast('Üretim tamamlanmadan depodan sevk edilemez.');
        if (order.orderType === 'stok' && (!order.customer || !order.dealerName)) {
          return openStockAssignModal(orderId);
        }
        const nowIso = new Date().toISOString();
        order.stageProgress.depo.startedAt = order.stageProgress.depo.startedAt || nowIso;
        order.stageProgress.depo.completedAt = nowIso;
        order.shippedAt = nowIso.slice(0, 10);
        postOrderSalesAccrual(order);
        pushCompletedTaskEntry(order, 'depo', 'Depo & Lojistik');
        updateOrderComputedStatus(order);
        pushNotification({
          type: 'success',
          title: 'Sipariş sevk edildi',
          message: `${order.no} depodan çıkış yaptı.`,
          targetUserIds: buildRoleTargetUsers(['Yönetim','Operasyon'], ['Sipariş Takip','Lojistik Yönetimi'], ['depo']),
          relatedOrderId: order.id
        });
        commitUi({ message: 'Sipariş sevk edildi.' });
      };


      const receiveIntoDepot = (orderId) => {
        const order = state.orders.find(o => o.id === orderId);
        if (!order) return;
        if (!order.factoryCompletedAt) return toast('Montaj tamamlanmadan ürün depoya alınamaz.');
        if (stageCompleted(order, 'depo')) return toast('Ürün zaten depoya alınmış.');
        const nowIso = new Date().toISOString();
        order.stageProgress.depo = order.stageProgress.depo || {};
        order.stageProgress.depo.startedAt = order.stageProgress.depo.startedAt || nowIso;
        order.stageProgress.depo.acceptedAt = order.stageProgress.depo.acceptedAt || nowIso;
        order.stageProgress.depo.acceptedBy = currentUser?.username || 'system';
        order.stageProgress.depo.acceptedById = currentUser?.id || 'system';
        order.stageProgress.depo.completedAt = nowIso;
        order.stageProgress.depo.completedBy = currentUser?.username || 'system';
        order.stageProgress.depo.completedById = currentUser?.id || 'system';
        pushAcceptedTaskEntry(order, 'depo', 'Depo Kabul');
        pushCompletedTaskEntry(order, 'depo', 'Depo Kabul');
        updateOrderComputedStatus(order);
        pushNotification({
          type: 'success',
          title: 'Ürün depoya alındı',
          message: `${order.no} depo stoğuna kabul edildi.`,
          targetUserIds: buildRoleTargetUsers(['Yönetim','Operasyon'], ['Sipariş Takip','Lojistik Yönetimi'], ['depo']),
          relatedOrderId: order.id
        });
        commitUi({ message: 'Ürün depoya alındı.' });
      };

      const openStockAssignModal = (orderId) => {
        const order = state.orders.find(o => o.id === orderId);
        if (!order) return;
        const html = `
          <div class="fieldGrid">
            <div><label>Toptancı / Cari</label><input class="input" id="stkCust" value="${esc(order.customer || '')}"></div>
            <div><label>Bayi / Nihai Müşteri</label><input class="input" id="stkDealer" value="${esc(order.dealerName || '')}"></div>
          </div>
          <div class="fieldGrid">
            <div><label>Telefon</label><input class="input" id="stkPhone" value="${esc(order.phone || '')}"></div>
            <div><label>Adres</label><input class="input" id="stkAddress" value="${esc(order.shippingAddress || '')}"></div>
          </div>
          <div class="row">
            <button class="btn primary" id="btnAssignStock">Kaydet ve Sevke Hazırla</button>
          </div>
        `;
        openModal('Stok siparişini cari / bayi ile eşleştir', html);
        document.getElementById('btnAssignStock').onclick = () => {
          const customer = document.getElementById('stkCust').value.trim();
          const dealerName = document.getElementById('stkDealer').value.trim();
          if (!customer || !dealerName) return toast('Cari ve bayi bilgisi zorunludur.');
          assignStockOrderToDealer(orderId, {
            customer,
            dealerName,
            phone: document.getElementById('stkPhone').value.trim(),
            shippingAddress: document.getElementById('stkAddress').value.trim()
          });
          closeModal();
        };
      };

      const getOrdersForDepartment = (deptKey) => {
        return state.orders
          .map(normalizeOrderRecord)
          .filter(order => {
            if (deptKey === 'depo') return !!order.factoryCompletedAt && !order.shippedAt;
            return stageReady(order, deptKey);
          })
          .sort((a, b) => (a.orderDate || '').localeCompare(b.orderDate || '') || (a.priority || 0) - (b.priority || 0));
      };

      const getFactoryCompletedPointsInRange = (startISO, endISO) => {
        return state.orders
          .map(normalizeOrderRecord)
          .filter(o => o.factoryCompletedAt && o.factoryCompletedAt >= startISO && o.factoryCompletedAt <= endISO)
          .reduce((sum, o) => sum + getOrderPoints(o), 0);
      };

      const getCompletedProductionOrdersInRange = (startISO, endISO) => {
        return state.orders
          .map(normalizeOrderRecord)
          .filter(o => o.factoryCompletedAt && o.factoryCompletedAt >= startISO && o.factoryCompletedAt <= endISO);
      };

      const getProductionReportSummary = (startISO, endISO) => {
        const completedOrders = getCompletedProductionOrdersInRange(startISO, endISO);
        const deptTotals = {};
        stages.forEach(s => deptTotals[s.key] = { count: 0, points: 0 });
        completedTasks
          .filter(t => t && t.date && t.date >= startISO && t.date <= endISO)
          .forEach(t => {
            const deptKey = t.dept || mapStatusToDeptKey(t.deptName || '') || '';
            if (deptTotals[deptKey]) {
              deptTotals[deptKey].count += 1;
              deptTotals[deptKey].points += Number(t.points || 0);
            }
          });

        const byProduct = {};
        const byModel = {};
        completedOrders.forEach(o => {
          const qty = Number(o.adet || 1);
          const pts = getOrderPoints(o);
          const productKey = o.productType || 'Belirsiz';
          const modelKey = o.model || 'Belirsiz';
          if (!byProduct[productKey]) byProduct[productKey] = { adet: 0, points: 0, siparis: 0 };
          if (!byModel[modelKey]) byModel[modelKey] = { adet: 0, points: 0, siparis: 0 };
          byProduct[productKey].adet += qty;
          byProduct[productKey].points += pts;
          byProduct[productKey].siparis += 1;
          byModel[modelKey].adet += qty;
          byModel[modelKey].points += pts;
          byModel[modelKey].siparis += 1;
        });

        return {
          completedOrders,
          totalOrders: completedOrders.length,
          totalUnits: completedOrders.reduce((sum, o) => sum + Number(o.adet || 1), 0),
          totalFactoryPoints: completedOrders.reduce((sum, o) => sum + getOrderPoints(o), 0),
          deptTotals,
          byProduct,
          byModel
        };
      };

      const generateOrderNo = () => {
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
        return 'ROMS-' + Array.from({ length: 8 }, () => chars[Math.floor(Math.random() * chars.length)]).join('');
      };

      const canViewOrders = () => hasPermission('siparis.goruntule');
      const canEditOrders = () => hasPermission('siparis.goruntule'); // Alias for backward compat
      const canCreateEditOrders = () => hasPermission('siparis.olustur') || hasPermission('siparis.duzenle');
      const canEditExpenses = () => hasPermission('finans.gider_duzenle') || hasPermission('finans.gider_ekle');
      const canSeeFinance = () => hasPermission('menu.finans') || hasPermission('finans.goruntule');
      const canSeeDepartment = () => hasPermission('menu.departman') || hasPermission('departman.goruntule');
      const canSeeMaterials = () => hasPermission('menu.hammaddeler') || hasPermission('hammadde.goruntule');
      const canSeeReports = () => hasPermission('menu.raporlar') || hasPermission('rapor.goruntule');

                actionType = 'accept';
                actionLabel = 'İşi Kabul Et';
                message = 'Bu işi üzerinize alıp üretime başlayabilirsiniz.';

        modelSelect.innerHTML = '<option>Önce Ürün Tipi</option>';

    return { material: null, variant: null };

    if (deptKey === 'depo') return shipOrder(id);

    if (!stageReady(order, deptKey)) {
      return toast('Bu sipariş bu aşama için henüz hazır değil.');
    }
    let result;
    if (!stageStarted(order, deptKey)) {
      result = markStageStarted(order, deptKey);
    } else {
      result = completeDepartmentStage(order, deptKey);
    }
    if (!result.ok) return toast(result.message);
    pushNotification({
      type: 'info',
      title: `${stageForDeptKey(deptKey)?.name || deptKey} işlemi güncellendi`,
      message: `${order.no} için ${result.message}`,
      targetUserIds: buildRoleTargetUsers(['Yönetim','Operasyon'], ['Sipariş Takip','Üretim Planlama','Lojistik Yönetimi'], [deptKey]),
      relatedOrderId: order.id
    });

  };

  const PAYMENT_METHODS = ['nakit', 'havale', 'eft', 'pos', 'cek', 'senet'];

  const ensureAccountingState = () => {
    state.accounts = Array.isArray(state.accounts) ? state.accounts : [];
    state.accountTransactions = Array.isArray(state.accountTransactions) ? state.accountTransactions : [];
    state.cashTransactions = Array.isArray(state.cashTransactions) ? state.cashTransactions : [];
    state.allocations = Array.isArray(state.allocations) ? state.allocations : [];
  };

  const uid = (prefix='id') => `${prefix}_${Date.now()}_${Math.random().toString(36).slice(2,8)}`;
  const monthRange = (monthOffset=0) => {
    const d = new Date();
    d.setDate(1);
    if (monthOffset) d.setMonth(d.getMonth() + monthOffset);
    const start = toISO(new Date(d.getFullYear(), d.getMonth(), 1, 12));
    const end = toISO(new Date(d.getFullYear(), d.getMonth()+1, 0, 12));
    return { start, end };
  };
  const inRange = (date, start, end) => !!date && date >= start && date <= end;
  const fmtPct = (n) => `%${Number(n || 0).toFixed(0)}`;
  const num = (v) => Number(v || 0);
  const todayDoc = () => todayISO();

  const createAccount = ({ type, name, title='', address='', taxOffice='', taxNo='', phone='', contact='', priceList='', discountRate=0, specialNotes='' }) => {
    ensureAccountingState();
    const cleaned = (name || '').trim();
    if (!cleaned) return null;
    const existing = state.accounts.find(a => a.type === type && a.name.toLowerCase() === cleaned.toLowerCase());
    if (existing) {
      Object.assign(existing, {
        ...existing,
        title: title || existing.title || '',
        address: address || existing.address || '',
        taxOffice: taxOffice || existing.taxOffice || '',
        taxNo: taxNo || existing.taxNo || '',
        phone: phone || existing.phone || '',
        contact: contact || existing.contact || '',
        priceList: priceList || existing.priceList || '',
        discountRate: discountRate ?? existing.discountRate ?? 0,
        specialNotes: specialNotes || existing.specialNotes || ''
      });
      return existing;
    }
    const account = {
      id: uid('acc'), type, name: cleaned, title, address, taxOffice, taxNo, phone, contact,
      priceList, discountRate: Number(discountRate || 0), specialNotes, createdAt: new Date().toISOString()
    };
    state.accounts.push(account);
    return account;
  };

  const findOrCreateAccountByName = (type, name) => {
    const cleaned = (name || '').trim();
    if (!cleaned) return null;
    const existing = state.accounts.find(a => a.type === type && a.name.toLowerCase() === cleaned.toLowerCase());
    return existing || createAccount({ type, name: cleaned });
  };

  const getAccountsByType = (type) => state.accounts.filter(a => a.type === type).sort((a,b)=>a.name.localeCompare(b.name,'tr'));

  const createCashTxn = ({ direction, amount, date, method='nakit', accountId=null, accountName='', category='', docNo='', description='', refType='', refId='' }) => {
    ensureAccountingState();
    const txn = { id: uid('cash'), direction, amount: num(amount), date: date || todayISO(), method, accountId, accountName, category, docNo, description, refType, refId, createdAt: new Date().toISOString() };
    state.cashTransactions.push(txn);
    return txn;
  };

  const createAccountTxn = ({ accountId, date, docNo='', txnType, amount, balanceEffect, description='', refType='', refId='', vatRate=0, linkedCash=false, cashDirection=null, cashMethod='', pnlType='none', meta={} }) => {
    ensureAccountingState();
    const account = state.accounts.find(a => a.id === accountId);
    if (!account) return null;
    const txn = {
      id: uid('atx'), accountId, accountType: account.type, accountName: account.name,
      date: date || todayISO(), docNo, txnType, amount: num(amount), balanceEffect: num(balanceEffect),
      description, refType, refId, vatRate: num(vatRate), pnlType, meta, createdAt: new Date().toISOString(), cashTxnId: null
    };
    if (linkedCash && txn.amount > 0) {
      const c = createCashTxn({
        direction: cashDirection || (txn.balanceEffect < 0 ? 'in' : 'out'),
        amount: txn.amount,
        date: txn.date,
        method: cashMethod || (txn.balanceEffect < 0 ? (state.settings?.accounting?.defaultCollectionMethod || 'havale') : (state.settings?.accounting?.defaultPaymentMethod || 'havale')),
        accountId: account.id,
        accountName: account.name,
        category: txnType,
        docNo,
        description,
        refType,
        refId
      });
      txn.cashTxnId = c.id;
    }
    state.accountTransactions.push(txn);
    autoAllocateAccount(account.id);
    return txn;
  };

  const getAccountBalance = (accountId) => state.accountTransactions.filter(t => t.accountId === accountId).reduce((s,t)=>s+num(t.balanceEffect),0);

  const getAllocatedAmount = (txnId, side) => {
    ensureAccountingState();
    return state.allocations
      .filter(a => side === 'debit' ? a.debitTxnId === txnId : a.creditTxnId === txnId)
      .reduce((sum, a) => sum + num(a.amount), 0);
  };

  const getOpenTxnAmount = (txn) => {
    const effect = num(txn.balanceEffect);
    if (effect > 0) return Math.max(0, effect - getAllocatedAmount(txn.id, 'debit'));
    if (effect < 0) return Math.max(0, Math.abs(effect) - getAllocatedAmount(txn.id, 'credit'));
    return 0;
  };

  const autoAllocateAccount = (accountId) => {
    ensureAccountingState();
    if (!(state.settings?.accounting?.autoAllocateAdvances ?? true)) return 0;
    const txns = state.accountTransactions
      .filter(t => t.accountId === accountId && !t.reversalOf && !t.cancelledAt && num(t.balanceEffect) !== 0)
      .sort((a,b)=>(a.date||'').localeCompare(b.date||'') || (a.createdAt||'').localeCompare(b.createdAt||''));
    const debits = txns.filter(t => num(t.balanceEffect) > 0);
    const credits = txns.filter(t => num(t.balanceEffect) < 0);
    let created = 0;
    for (const d of debits) {
      let dOpen = getOpenTxnAmount(d);
      if (dOpen <= 0) continue;
      for (const c of credits) {
        let cOpen = getOpenTxnAmount(c);
        if (cOpen <= 0) continue;
        const amount = Math.min(dOpen, cOpen);
        if (amount <= 0) continue;
        state.allocations.push({
          id: uid('alloc'), accountId, debitTxnId: d.id, creditTxnId: c.id, amount,
          date: todayISO(), createdAt: new Date().toISOString(), note: 'Otomatik mahsup'
        });
        created += 1;
        dOpen -= amount;
        if (dOpen <= 0) break;
      }
    }
    return created;
  };

  const getCashLedgerSummary = () => {
    ensureAccountingState();
    const labels = state.settings?.accounting?.cashLedgerLabels || {};
    const methods = Array.from(new Set(PAYMENT_METHODS.concat(state.cashTransactions.map(t => t.method || 'nakit'))));
    return methods.map(method => {
      const rows = state.cashTransactions.filter(t => (t.method || 'nakit') === method);
      const inTotal = rows.filter(t => t.direction === 'in').reduce((s,t)=>s+num(t.amount),0);
      const outTotal = rows.filter(t => t.direction === 'out').reduce((s,t)=>s+num(t.amount),0);
      return { method, label: labels[method] || method.toUpperCase(), inTotal, outTotal, balance: inTotal - outTotal };
    });
  };

  const reverseAccountTxn = (txnId) => {
    ensureAccountingState();
    const tx = state.accountTransactions.find(t => t.id === txnId);
    if (!tx) return toast('Hareket bulunamadı.');

    return confirmAction('Bu hareket için ters kayıt oluşturulsun mu? Orijinal hareket silinmez, iz bırakılır.', () => {
    tx.cancelledAt = new Date().toISOString();
    tx.cancelledBy = currentUser?.username || 'system';
    const rev = {
      ...tx,
      id: uid('atx_rev'),
      txnType: 'reversal_' + (tx.txnType || 'txn'),
      amount: -num(tx.amount),
      balanceEffect: -num(tx.balanceEffect),
      description: 'İPTAL / TERS KAYIT: ' + (tx.description || tx.txnType || ''),
      reversalOf: tx.id,
      cancelledAt: null,
      cancelledBy: '',
      createdAt: new Date().toISOString(),
      cashTxnId: null
    };
    if (tx.cashTxnId) {
      const cash = state.cashTransactions.find(c => c.id === tx.cashTxnId);
      if (cash && !cash.cancelledAt) {
        cash.cancelledAt = new Date().toISOString();
        cash.cancelledBy = currentUser?.username || 'system';
        const cashRev = {
          ...cash,
          id: uid('cash_rev'),
          direction: cash.direction === 'in' ? 'out' : 'in',
          category: 'reversal_' + (cash.category || 'cash'),
          description: 'İPTAL / TERS KASA: ' + (cash.description || ''),
          reversalOf: cash.id,
          cancelledAt: null,
          cancelledBy: '',
          createdAt: new Date().toISOString()
        };
        state.cashTransactions.push(cashRev);
        rev.cashTxnId = cashRev.id;
      }
    }
    state.accountTransactions.push(rev);
    autoAllocateAccount(tx.accountId);
    saveState();
    renderFinance();
    toast('Ters kayıt oluşturuldu.');
    }, { title: 'Ters Cari Kayıt Onayı', yes: 'Ters Kayıt Oluştur' });
  };

  const getMonthlyAccountingSummary = (monthOffset=0) => {
    ensureAccountingState();
    const { start, end } = monthRange(monthOffset);
    const atx = state.accountTransactions.filter(t => inRange(t.date, start, end));
    const cash = state.cashTransactions.filter(t => inRange(t.date, start, end));
    const total = (arr, fn) => arr.reduce((s,x)=>s+num(fn(x)),0);
    const salesAccrual = total(atx.filter(t => t.pnlType === 'sales'), t => t.amount);
    const purchaseAccrual = total(atx.filter(t => t.pnlType === 'purchase'), t => t.amount);
    const manualExpense = total(atx.filter(t => t.pnlType === 'expense'), t => t.amount);
    const personnelExpense = total(atx.filter(t => t.pnlType === 'personnel'), t => t.amount);
    const collections = total(cash.filter(t => t.direction === 'in'), t => t.amount);
    const cashOut = total(cash.filter(t => t.direction === 'out'), t => t.amount);
    const supplierPayments = total(cash.filter(t => t.direction === 'out' && ['supplier_payment','supplier_advance'].includes(t.category)), t => t.amount);
    const personnelPayments = total(cash.filter(t => t.direction === 'out' && ['salary_payment','salary_advance'].includes(t.category)), t => t.amount);
    const totalReceivable = total(getAccountsByType('customer'), a => Math.max(0, getAccountBalance(a.id)));
    const customerAdvances = total(getAccountsByType('customer'), a => Math.max(0, -getAccountBalance(a.id)));
    const totalPayable = total(getAccountsByType('supplier'), a => Math.max(0, getAccountBalance(a.id)));
    const supplierAdvances = total(getAccountsByType('supplier'), a => Math.max(0, -getAccountBalance(a.id)));
    const personnelBalance = total(getAccountsByType('personnel'), a => getAccountBalance(a.id));
    const estimatedProfit = salesAccrual - purchaseAccrual - manualExpense - personnelExpense;
    return { start, end, salesAccrual, purchaseAccrual, manualExpense, personnelExpense, collections, cashOut, supplierPayments, personnelPayments, totalReceivable, customerAdvances, totalPayable, supplierAdvances, personnelBalance, estimatedProfit, netCashFlow: collections - cashOut };
  };

    const account = findOrCreateAccountByName('customer', customerName);

    createAccountTxn({

      date: (order.shippedAt || todayISO()).slice(0,10),

      txnType: 'sales_invoice',

      description: `${order.no || 'Sipariş'} sevk edildi`,
      refType: 'order',
      refId: order.id,

    });
    const rawOrder = state.orders.find(o => o.id === order.id);

    return true;
  };

  const getEmployeeTaskSummary = (emp, startISO, endISO) => {
    const linkedUser = emp.linkedUserId ? users.find(u => u.id === emp.linkedUserId) : null;
    const username = linkedUser?.username || '';
    const logs = (completedTasks || []).filter(task => {
      if (!task.date || task.date < startISO || task.date > endISO) return false;
      if (username && task.userId === emp.linkedUserId) return true;
      if (username && String(task.username || '').toLowerCase() === username.toLowerCase()) return true;
      return false;
    });
    return {
      taskCount: logs.length,
      completedPoints: logs.reduce((sum, log) => sum + Number(log.points || 0), 0)
    };
  };

  const renderEmployeePerformanceReport = () => {
    const { start, end } = getMonthStartEnd(0);
    const employees = (state.employees || []).filter(e => e.active !== false);
    if (!employees.length) {
      return `<div class="empty-state">Henüz personel kaydı yok.</div>`;
    }
    const rows = employees.map(emp => {
      const attendance = getEmployeeMonthlyAttendanceSummary(emp.id, start, end);
      const task = getEmployeeTaskSummary(emp, start, end);
      const planned = Math.max(1, Number(attendance.plannedHours || 0));
      const filled = Number(attendance.payableHours || 0);
      const overtimeHours = Math.max(0, Number(attendance.workedHours || 0) - planned);
      const fillRatio = Math.round((filled / planned) * 100);
      const taskCompletionRatio = task.completedPoints > 0 && filled > 0 ? Math.min(999, Math.round((task.completedPoints / Math.max(1, filled * 10)) * 100)) : 0;
      const leaveFrequency = attendance.leaveDays;
      const continuityScore = Math.max(0, 100 - Math.round(((attendance.absentDays * 8) + (attendance.lateHours * 2) + attendance.missingHours)));
      return {
        id: emp.id,
        name: emp.name || emp.fullName || 'İsimsiz Personel',
        role: emp.role || '-',
        subRole: emp.subRole || emp.department || '-',
        plannedHours: planned,
        payableHours: filled,
        workedHours: Number(attendance.workedHours || 0),
        overtimeHours,
        leaveDays: leaveFrequency,
        presentDays: attendance.presentDays,
        absentDays: attendance.absentDays,
        lateHours: Math.round((attendance.lateHours || 0) * 10) / 10,
        missingHours: Math.round((attendance.missingHours || 0) * 10) / 10,
        fillRatio,
        continuityScore,
        taskCount: task.taskCount,
        completedPoints: task.completedPoints,
        taskCompletionRatio
      };
    }).sort((a,b) => b.continuityScore - a.continuityScore);

    const selectedId = activeEmployeeReportId === 'all' ? 'all' : (rows.find(r => r.id === activeEmployeeReportId)?.id || 'all');
    activeEmployeeReportId = selectedId;
    const selected = selectedId === 'all' ? null : rows.find(r => r.id === selectedId);
    const avgFill = Math.round(rows.reduce((s,r) => s + r.fillRatio, 0) / rows.length);
    const totalOvertime = rows.reduce((s,r) => s + r.overtimeHours, 0);
    const totalLeave = rows.reduce((s,r) => s + r.leaveDays, 0);
    const avgContinuity = Math.round(rows.reduce((s,r) => s + r.continuityScore, 0) / rows.length);
    const employeeOptions = ['<option value="all">Tüm personel</option>'].concat(rows.map(r => `<option value="${r.id}" ${selectedId===r.id?'selected':''}>${esc(r.name)}</option>`));

    const summaryHtml = `
      <div class="summary-stats">
        ${[[ 'Aktif Personel', rows.length ], [ 'Saat Doldurma Ort.', `%${avgFill}` ], [ 'Toplam Mesai', `${Math.round(totalOvertime * 10) / 10} saat` ], [ 'İzin Kullanımı', `${totalLeave} gün` ], [ 'Devamlılık Ort.', `%${avgContinuity}` ]].map(([label,val]) => `<div class="stat-card"><div class="stat-label">${label}</div><div class="stat-value">${val}</div></div>`).join('')}
      </div>`;

    const tableHtml = `
      <div class="analizTablo"><table><tr><th>Personel</th><th>Rol</th><th>Saat Doldurma</th><th>Mesai</th><th>İzin</th><th>Devamsızlık</th><th>Görev</th><th>Puan</th><th>Devamlılık</th></tr>
      ${rows.map(r => `<tr><td>${esc(r.name)}</td><td>${esc(r.role)} / ${esc(r.subRole)}</td><td>%${r.fillRatio}</td><td>${r.overtimeHours.toFixed(1)} saat</td><td>${r.leaveDays} gün</td><td>${r.absentDays} gün</td><td>${r.taskCount}</td><td>${r.completedPoints}</td><td>%${r.continuityScore}</td></tr>`).join('')}
      </table></div>`;

    const detailHtml = !selected ? '' : `
      <section class="softPanel" style="margin-top:16px;">
        <div class="softPanelHead"><div class="softPanelTitle">${icon('user')} ${esc(selected.name)} · Personel Özel Performans</div></div>
        <div class="softPanelBody">
          <div class="statsGrid">
            <div class="miniStat"><div class="miniStatLabel">Planlanan Saat</div><div class="miniStatValue">${selected.plannedHours}</div><div class="miniStatMeta">Aylık plan</div></div>
            <div class="miniStat"><div class="miniStatLabel">Ödenebilir Saat</div><div class="miniStatValue">${selected.payableHours}</div><div class="miniStatMeta">Saatini doldurmuş mu</div></div>
            <div class="miniStat"><div class="miniStatLabel">Mesai</div><div class="miniStatValue">${selected.overtimeHours.toFixed(1)}</div><div class="miniStatMeta">Ekstra çalışma saati</div></div>
            <div class="miniStat"><div class="miniStatLabel">Geç Kalma</div><div class="miniStatValue">${selected.lateHours}</div><div class="miniStatMeta">Toplam geç kalınan saat</div></div>
            <div class="miniStat"><div class="miniStatLabel">Eksik Saat</div><div class="miniStatValue">${selected.missingHours}</div><div class="miniStatMeta">Tamamlanmayan süre</div></div>
            <div class="miniStat"><div class="miniStatLabel">Görev Karşılama</div><div class="miniStatValue">%${selected.taskCompletionRatio}</div><div class="miniStatMeta">Tamamlanan iş yoğunluğu</div></div>
          </div>
          <div class="analizTablo" style="margin-top:16px;"><table><tr><th>Metri̇k</th><th>Değer</th></tr>
            <tr><td>Rol / Birim</td><td>${esc(selected.role)} / ${esc(selected.subRole)}</td></tr>
            <tr><td>Geldiği Gün</td><td>${selected.presentDays} gün</td></tr>
            <tr><td>Gelmediği Gün</td><td>${selected.absentDays} gün</td></tr>
            <tr><td>İzin Kullanımı</td><td>${selected.leaveDays} gün</td></tr>
            <tr><td>Tamamlanan Görev</td><td>${selected.taskCount}</td></tr>
            <tr><td>Tamamlanan Puan</td><td>${selected.completedPoints}</td></tr>
            <tr><td>Devamlılık Skoru</td><td>%${selected.continuityScore}</td></tr>
          </table></div>
        </div>
      </section>`;

    return `
      <div class="fieldGrid" style="margin-bottom:16px;">
        <div><label>Rapor Dönemi</label><input class="input" value="${formatDate(start)} - ${formatDate(end)}" disabled></div>
        <div><label>Personel Seç</label><select class="input" id="employeeReportSelect">${employeeOptions.join('')}</select></div>

      ${summaryHtml}

      ${tableHtml}
      ${detailHtml}

  };

  const attachReportEventListeners = () => {
    const handlers = {
      exportOrdersReport: () => exportCSV('orders'),
      exportProductionReport: () => exportCSV('production'),
      exportExpensesReport: () => exportCSV('expenses'),
      exportMaterialsReport: () => exportCSV('materials'),
      exportMovementsReport: () => exportCSV('movements'),
      exportProfitLossReport: () => exportCSV('profitloss')
    };
    Object.entries(handlers).forEach(([id, handler]) => {
      const btn = document.getElementById(id);
      if (btn) btn.onclick = handler;
    });
  };

  const getMonthBounds = (base = new Date()) => {
    const start = new Date(base.getFullYear(), base.getMonth(), 1);
    const end = new Date(base.getFullYear(), base.getMonth() + 1, 0, 23, 59, 59, 999);
    return { startISO: toISO(start), endISO: toISO(end), monthLabel: start.toLocaleDateString('tr-TR', { month: 'long', year: 'numeric' }) };
  };

  const getMonthlyIncomingPoints = (startISO, endISO) => {
    return state.orders
      .filter(o => o.orderDate && o.orderDate >= startISO && o.orderDate <= endISO)
      .reduce((sum, o) => sum + Number(o.points || (computePoints(o.productType, o.model) * (o.adet || 1)) || 0), 0);
  };

  const getDeptMonthlyActualPoints = (deptName, startISO, endISO) => {
    const deptKey = mapStatusToDeptKey(deptName) || deptName;
    return completedTasks
      .filter(t => (t.deptName === deptName || t.dept === deptKey || t.dept === deptName) && t.date && t.date >= startISO && t.date <= endISO)
      .reduce((sum, t) => sum + Number(t.points || 0), 0);
  };

  const getApplicableMonthlyDeptTarget = (deptName, startISO, endISO) => {
    const capacityTarget = Number(state.settings.unitDailyTarget || 900) * Number(state.settings.workdaysPerMonth || 20);
    const incoming = getMonthlyIncomingPoints(startISO, endISO);
    return Math.min(capacityTarget, incoming || 0);
  };

  const getDepartmentHrSummary = (deptName, startISO, endISO) => {
    const actual = getDeptMonthlyActualPoints(deptName, startISO, endISO);
    const target = getApplicableMonthlyDeptTarget(deptName, startISO, endISO) / Math.max(1, getDepartmentMetaList().length);
    const ratio = target > 0 ? actual / target : 0;
    const warningThreshold = Number(state.hrPolicy?.warningThresholdRatio || 0.95);
    const penaltyThreshold = Number(state.hrPolicy?.penaltyThresholdRatio || 0.95);
    const penaltyMultiplier = Number(state.hrPolicy?.penaltyMultiplier || 2);
    const bonusRatio = state.hrPolicy?.bonusEnabled && ratio > 1 ? Math.max(0, ratio - 1) : 0;
    const warningOnly = target > 0 && ratio < 1 && ratio >= warningThreshold;
    const performanceLoss = target > 0 ? Math.max(0, 1 - ratio) : 0;
    const penaltyRatio = target > 0 && ratio < penaltyThreshold ? performanceLoss * penaltyMultiplier : 0;
    return { actual, target, ratio, bonusRatio, penaltyRatio, warningOnly, performanceLoss, penaltyMultiplier };
  };

const getEmployeesByDept = (deptName) => (state.employees || []).filter(emp => (emp.department || '') === deptName && emp.active !== false);

const parseHHMM = (val) => {
if (!val || !/^\d{2}:\d{2}$/.test(val)) return null;
const [h,m] = val.split(':').map(Number);
return h * 60 + m;
};

const calcWorkedHours = (checkIn, checkOut) => {
const start = parseHHMM(checkIn);
const end = parseHHMM(checkOut);
if (start == null || end == null || end <= start) return 0;
return Math.round(((end - start) / 60) * 100) / 100;
};

const getOpenAttendance = (employeeId) => {
return (state.attendanceLogs || []).find(log => log.employeeId === employeeId && log.date === todayISO() && !log.checkOut);
};

const getEmployeeMonthlyAttendanceSummary = (employeeId, startISO, endISO) => {
const dailyHours = Math.max(1, Number(state.settings.dailyWorkHours || 10));
const workdays = Math.max(1, Number(state.settings.workdaysPerMonth || 20));
const logs = (state.attendanceLogs || []).filter(log => log.employeeId === employeeId && log.date && log.date >= startISO && log.date <= endISO);
let workedHours = 0;
let payableHours = 0;
let presentDays = 0;
let absentDays = 0;
let leaveDays = 0;
let lateHours = 0;
let missingHours = 0;
logs.forEach(log => {
const status = log.status || 'Tam Gün';
const baseWorked = Number(log.workedHours || 0) || calcWorkedHours(log.checkIn, log.checkOut);
const explicitMissing = Number(log.missingHours || 0);
const explicitLate = Number(log.lateHours || 0);
lateHours += explicitLate;
missingHours += explicitMissing;
if (status === 'Gelmedi') {
absentDays += 1;
return;
}
if (status === 'İzinli') {
leaveDays += 1;
payableHours += dailyHours;
workedHours += dailyHours;
presentDays += 1;
return;
}
if (status === 'Raporlu') {
return;
}
const effectiveWorked = Math.max(0, baseWorked || Math.max(0, dailyHours - explicitMissing));
workedHours += effectiveWorked;
payableHours += Math.min(dailyHours, effectiveWorked);
if (effectiveWorked > 0) presentDays += 1;
else absentDays += 1;
});
const plannedHours = dailyHours * workdays;
return { logs, plannedHours, workedHours, payableHours, presentDays, absentDays, leaveDays, lateHours, missingHours, equivalentDays: Math.round((payableHours / dailyHours) * 100) / 100 };
};

const getEmployeeAcceptedPointsSummary = (employeeId, startISO, endISO) => {
const accepted = (acceptedTasks || []).filter(task => task.userId === employeeId && task.date && task.date >= startISO && task.date <= endISO);
const completed = (completedTasks || []).filter(task => task.userId === employeeId && task.date && task.date >= startISO && task.date <= endISO);
const acceptedPoints = accepted.reduce((sum, task) => sum + Number(task.points || 0), 0);
const completedPoints = completed.reduce((sum, task) => sum + Number(task.points || 0), 0);
const efficiency = acceptedPoints > 0 ? Math.min(1, completedPoints / acceptedPoints) : 1;
return { accepted, completed, acceptedPoints, completedPoints, efficiency };
};

const getEmployeeSuggestedPayroll = (emp, hrSummary, startISO, endISO) => {
const salary = Number(emp.salary || 0);
const attendance = getEmployeeMonthlyAttendanceSummary(emp.id, startISO, endISO);
const plannedHours = Math.max(1, attendance.plannedHours);
const effectiveBase = salary * Math.min(1, attendance.payableHours / plannedHours);
const perf = getEmployeeAcceptedPointsSummary(emp.id, startISO, endISO);
const warningThreshold = Number(state.hrPolicy?.warningThresholdRatio || 0.95);
const penaltyThreshold = Number(state.hrPolicy?.penaltyThresholdRatio || 0.95);
const penaltyMultiplier = Number(state.hrPolicy?.penaltyMultiplier || 2);
const performanceLoss = Math.max(0, 1 - perf.efficiency);
const warningOnly = perf.acceptedPoints > 0 && perf.efficiency < 1 && perf.efficiency >= warningThreshold;
const penaltyRate = state.hrPolicy?.penaltyEnabled && perf.acceptedPoints > 0 && perf.efficiency < penaltyThreshold ? performanceLoss * penaltyMultiplier : 0;
const suggestedBonus = state.hrPolicy?.bonusEnabled ? Math.max(0, effectiveBase * (hrSummary?.bonusRatio || 0)) : 0;
const suggestedPenalty = Math.min(effectiveBase, effectiveBase * penaltyRate);
return {
attendance,
performance: {
acceptedPoints: perf.acceptedPoints,
completedPoints: perf.completedPoints,
efficiency: perf.efficiency,
performanceLoss,
warningOnly,
penaltyRate,
penaltyMultiplier
},
effectiveBase,
attendanceDays: attendance.equivalentDays,
suggestedBonus,
suggestedPenalty,
suggestedNet: Math.max(0, effectiveBase + suggestedBonus - suggestedPenalty)
};
};
