  const computePlan = () => {
    const holidays = parseHolidays();
    const capStart = fromISO(state.settings.capacityStart || todayISO());
    const dailyCap = Number(state.settings.dailyCapacity || 960);
    const activeOrders = state.orders.filter(o => !isDone(o));
    const enriched = activeOrders.map(o => {
      const points = computePoints(o.productType, o.model) * (o.adet || 1);
      const doseme = stageRange(o.orderDate, stageForDeptKey('doseme').from, stageForDeptKey('doseme').to);
      return { ...o, points, dosemeStart: doseme.startISO };
    });
    enriched.sort((a,b)=>a.orderDate.localeCompare(b.orderDate)||(a.priority||0)-(b.priority||0));
    const dayMap = new Map();
    const ensureDay = (iso) => { if (!dayMap.has(iso)) dayMap.set(iso, { used:0, cap:dailyCap, items:[] }); return dayMap.get(iso); };
    for (const o of enriched) {
      let d = fromISO(o.dosemeStart);
      if (d < capStart) d = new Date(capStart);
      while (!isWorkday(d, holidays)) d = addDays(d, 1);
      while (true) {
        const iso = toISO(d);
        const slot = ensureDay(iso);
        if (slot.used + o.points <= slot.cap) {
          slot.used += o.points;
          slot.items.push(o.id);
          o.capacityDay = iso;
          break;
        }
        d = addDays(d, 1);
        while (!isWorkday(d, holidays)) d = addDays(d, 1);
      }
    }
    for (const o of enriched) {
      let od = fromISO(o.orderDate);
      while (!isWorkday(od, holidays)) od = addDays(od, 1);
      o.planStart = toISO(addWorkdays(od, 1, holidays));
      if (!o.capacityDay) o.capacityDay = o.planStart;
    }
    return { dayMap, enriched, dailyCap, holidays, capStartISO: toISO(capStart) };
  };

  const drawFinanceBars = (canvas, labels, values, opts) => {
    const dpr = window.devicePixelRatio||1, w=canvas.clientWidth, h=canvas.clientHeight;
    canvas.width = w*dpr; canvas.height = h*dpr;
    const ctx = canvas.getContext('2d');
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.clearRect(0,0,w,h);
    const max = Math.max(opts.max||1,1);
    const padL=30,padR=10,padT=20,padB=30, innerW=w-padL-padR, innerH=h-padT-padB;
    ctx.strokeStyle='#ddd'; ctx.lineWidth=1; ctx.setLineDash([3,3]);
    for (let i=0;i<=4;i++) { let y=padT+(innerH*(1-i/4)); ctx.beginPath(); ctx.moveTo(padL,y); ctx.lineTo(w-padR,y); ctx.stroke(); }
    ctx.setLineDash([]);
    const n=labels.length, gap=4, barW=Math.max(4,(innerW-(n-1)*gap)/n);
    for (let i=0;i<n;i++) {
      const x=padL+i*(barW+gap), v=values[i]||0, bh=(v/max)*innerH, y=padT+(innerH-bh);

  const drawTargetBars = (canvas, labels, values, opts = {}) => {

    const dpr = window.devicePixelRatio||1, w=canvas.clientWidth || 1, h=canvas.clientHeight || 1;
    canvas.width = w*dpr; canvas.height = h*dpr;

    ctx.clearRect(0,0,w,h);
    const max = Math.max(opts.max||1,1), target = opts.target||500;
    const padL=30,padR=10,padT=20,padB=30, innerW=w-padL-padR, innerH=h-padT-padB;
    ctx.strokeStyle='#ddd'; ctx.lineWidth=1; ctx.setLineDash([3,3]);
    for (let i=0;i<=4;i++) { let y=padT+(innerH*(1-i/4)); ctx.beginPath(); ctx.moveTo(padL,y); ctx.lineTo(w-padR,y); ctx.stroke(); }
    ctx.setLineDash([]);

    ctx.fillStyle='#F97316'; ctx.font='bold 10px sans-serif'; ctx.fillText(target, w-padR-44, targetY-5);
    const n=labels.length, gap=opts.dense?2:4, barW=Math.max(4,(innerW-(n-1)*gap)/n);

    const criticalMaterials = (state.materials || []).reduce((sum, m) => sum + (m.variants || []).filter(v => Number(v.stock || 0) <= Number(v.critical || 0)).length, 0);
    const today = todayISO();
    const todayShipments = orders.filter(o => o.shippedAt && sameDayISO(o.shippedAt, today)).reduce((sum, o) => sum + Number(o.adet || 1), 0);
    return { openOrders: openOrders.length, readyForWarehouse, stockAssignmentsPending, criticalMaterials, todayShipments };
  };

  const renderHome = () => {
    if (!currentUser) { showLogin(); return; }
    const safeMonthlyFinance = (() => { try { return getMonthlyFinance(0) || { gelir: 0, gider: 0, kar: 0 }; } catch (_) { return { gelir: 0, gider: 0, kar: 0 }; } })();
    const income = Number(safeMonthlyFinance.gelir || 0);
    const expenses = Number(safeMonthlyFinance.gider || 0);
    const net = Number(safeMonthlyFinance.kar || 0);
    const stock = (() => { try { return Number(getStockValue() || 0); } catch (_) { return 0; } })();
    const orders = (state.orders || []).map(o => normalizeOrderRecord ? normalizeOrderRecord(o) : o);
    const today = todayISO();
    const weekStart = toISO(getWeekStart(new Date()));
    const weekEnd = toISO(getWeekEnd(new Date()));
    const monthStart = toISO(getMonthStart(new Date()));
    const monthEnd = toISO(getMonthEnd(new Date()));
    const pointsOf = (order) => {
      const map = { 'Sağ Köşe':130, 'Sol Köşe':130, 'Üçlü':100, 'İkili':80, 'Tekli':55, 'Berjer':45, 'İskandinav Berjer':45, 'Puf':25, 'Mini Puf':15, 'Kanepe':80, 'İskandinav':45 };
      return Number(map[order.productType] || 0) * Number(order.adet || 1);
    };
    const completedFactory = orders.filter(o => o.factoryCompletedAt && o.factoryCompletedAt >= weekStart && o.factoryCompletedAt <= weekEnd);
    const factoryTodayPoints = orders.filter(o => o.factoryCompletedAt === today).reduce((sum, o) => sum + pointsOf(o), 0);
    const factoryWeekPoints = completedFactory.reduce((sum, o) => sum + pointsOf(o), 0);
    const factoryMonthPoints = orders.filter(o => o.factoryCompletedAt && o.factoryCompletedAt >= monthStart && o.factoryCompletedAt <= monthEnd).reduce((sum, o) => sum + pointsOf(o), 0);
    const safeStageCompleted = (order, key) => !!(order && order.stageProgress && order.stageProgress[key] && order.stageProgress[key].completedAt);
    const openOrders = orders.filter(o => !o.shippedAt);
    const signals = {
      openOrders: openOrders.length,
      readyForWarehouse: openOrders.filter(o => safeStageCompleted(o, 'montaj') && !o.shippedAt).length,
      stockAssignmentsPending: openOrders.filter(o => String(o.orderType || '').toLowerCase() === 'stok' && safeStageCompleted(o, 'montaj') && !o.shippedAt && !(o.dealerName || o.customer || o.endCustomer)).length,
      criticalMaterials: (state.materials || []).reduce((sum, m) => sum + (m.variants || []).filter(v => Number(v.stock || 0) <= Number(v.critical || 0)).length, 0),
      todayShipments: orders.filter(o => o.shippedAt && sameDayISO(o.shippedAt, today)).reduce((sum, o) => sum + Number(o.adet || 1), 0)
    };
    elements.viewRoot.innerHTML = `
      <section class="card">
        <div class="cardHead">
          <div class="h">${icon("home")} Genel Özet</div>
          <span class="pill">${esc(currentUser.username)} (${esc(getRoleBadge())})</span>
        </div>
        <div class="cardBody">
          <div class="financeGrid">
            <div class="financeCard"><div class="label">Bu Ay Gelir</div><div class="value">${fmtMoney(income)}</div></div>
            <div class="financeCard"><div class="label">Bu Ay Gider</div><div class="value">${fmtMoney(expenses)}</div></div>
            <div class="financeCard"><div class="label">Net Kar</div><div class="value">${fmtMoney(net)}</div></div>
            <div class="financeCard"><div class="label">Stok Değeri</div><div class="value">${fmtMoney(stock)}</div></div>
          </div>
          <div class="statsGrid" style="margin-top:16px;">
            <div class="miniStat"><div class="miniStatLabel">Açık Sipariş</div><div class="miniStatValue">${signals.openOrders}</div><div class="miniStatMeta">Üretim veya depo akışında bekleyen işler</div></div>
            <div class="miniStat"><div class="miniStatLabel">Depoya İnmesi Gereken</div><div class="miniStatValue">${signals.readyForWarehouse}</div><div class="miniStatMeta">Montajı bitmiş, depo kabul bekleyen ürün</div></div>
            <div class="miniStat"><div class="miniStatLabel">Stok Sahiplendirme</div><div class="miniStatValue">${signals.stockAssignmentsPending}</div><div class="miniStatMeta">Cari / bayi ataması bekleyen stok işi</div></div>
            <div class="miniStat"><div class="miniStatLabel">Kritik Hammadde</div><div class="miniStatValue">${signals.criticalMaterials}</div><div class="miniStatMeta">Kritik eşikteki varyant sayısı</div></div>
          </div>
          <div class="statsGrid" style="margin-top:16px;">
            <button class="btn" id="btnGoOrdersFast">${icon('plus')} Yeni Sipariş</button>
            <button class="btn" id="btnGoDeptFast">${icon('department')} Departman Akışı</button>
            <button class="btn" id="btnGoReportsFast">${icon('reports')} Raporlar</button>
            <button class="btn" id="btnGoHrFast">${icon('user')} İnsan Kaynakları</button>
          </div>
        </div>
      </section>
      <section class="card">
        <div class="cardHead"><div class="h">${icon('chart')} Haftalık Hedef</div><span class="pill">Bugün sevk edilen adet: ${signals.todayShipments}</span></div>
        <div class="cardBody"><div class="canvasBox"><canvas id="weeklyTargetChart"></canvas></div></div>
      </section>
      <section class="card">
        <div class="cardHead"><div class="h">${icon('finance')} Fabrika Tamamlanmış Üretim</div></div>
        <div class="cardBody">
          <div class="statsGrid">
            <div class="miniStat"><div class="miniStatLabel">Günlük</div><div class="miniStatValue">${factoryTodayPoints}</div><div class="miniStatMeta">Tamamlanan üretim puanı</div></div>
            <div class="miniStat"><div class="miniStatLabel">Haftalık</div><div class="miniStatValue">${factoryWeekPoints}</div><div class="miniStatMeta">${weekStart} - ${weekEnd}</div></div>
            <div class="miniStat"><div class="miniStatLabel">Aylık</div><div class="miniStatValue">${factoryMonthPoints}</div><div class="miniStatMeta">${monthStart} - ${monthEnd}</div></div>
          </div>
        </div>
      </section>`;
    document.getElementById('btnGoOrdersFast')?.addEventListener('click', () => canAccessView('orders') ? setView('orders') : toast('Yetkiniz yok'));
    document.getElementById('btnGoDeptFast')?.addEventListener('click', () => canAccessView('department') ? setView('department') : toast('Yetkiniz yok'));
    document.getElementById('btnGoReportsFast')?.addEventListener('click', () => canAccessView('reports') ? setView('reports') : toast('Yetkiniz yok'));
    document.getElementById('btnGoHrFast')?.addEventListener('click', () => canSeeHR() ? setView('hr') : toast('Yetkiniz yok'));
    try { drawWeeklyTargetChart(); } catch (err) { console.warn('Haftalık grafik çizilemedi:', err); }
  };

  const renderDesktopSidebar = () => {
    const sb = document.getElementById('desktopSidebar');
    if (!sb || !currentUser) { if (sb) sb.innerHTML = ''; return; }
    const items = [];
    if (canAccessView('home')) items.push({ view: 'home', label: 'Genel Özet', ic: 'home' });
    if (canAccessView('orders')) items.push({ view: 'orders', label: 'Siparişler', ic: 'orders' });
    if (canAccessView('department')) items.push({ view: 'department', label: 'Departman', ic: 'department' });
    if (canAccessView('materials')) items.push({ view: 'materials', label: 'Hammaddeler', ic: 'materials' });
    if (canAccessView('finance')) items.push({ view: 'finance', label: 'Finans', ic: 'finance' });
    if (canAccessView('reports')) items.push({ view: 'reports', label: 'Raporlar', ic: 'reports' });
    if (canSeeHR()) items.push({ view: 'hr', label: 'İnsan Kaynakları', ic: 'user' });
    if (canSeeSettings()) items.push({ view: 'settings', label: 'Ayarlar', ic: 'settings' });
    if (canSeeAdminPanel()) items.push({ view: 'admin', label: 'Admin Paneli', ic: 'admin' });
    sb.innerHTML = `
      <div class="sidebar-section">Navigasyon</div>
      ${items.map(item => `<button type="button" class="sidebar-item ${view === item.view ? 'active' : ''}" data-view="${item.view}">${icon(item.ic)}<span>${esc(item.label)}</span></button>`).join('')}
      <div class="sidebar-divider"></div>
      <button type="button" class="sidebar-item sidebar-logout" id="sbLogout">${icon('logout')}<span>Çıkış Yap</span></button>
    `;
    sb.querySelectorAll('[data-view]').forEach(el => el.addEventListener('click', () => setView(el.dataset.view)));
    document.getElementById('sbLogout')?.addEventListener('click', logout);
  };

  const updateDrawerMenu = () => {
    if (!elements.drawerMenuItems) return;
    const items = [];
    if (canAccessView('home')) items.push({ view: 'home', label: 'Genel Özet', ic: 'home' });
    if (canAccessView('orders')) items.push({ view: 'orders', label: 'Siparişler', ic: 'orders' });
    if (canAccessView('department')) items.push({ view: 'department', label: 'Departman', ic: 'department' });
    if (canAccessView('materials')) items.push({ view: 'materials', label: 'Hammaddeler', ic: 'materials' });
    if (canAccessView('finance')) items.push({ view: 'finance', label: 'Finans', ic: 'finance' });

    });
    document.getElementById('navLogout')?.addEventListener('click', logout);
  };

  const getStockValue = () => {
    return (state.materials || []).reduce((sum, m) => sum + (m.variants || []).reduce((s, v) => s + Number(v.stock || 0) * Number(v.unitCost || 0), 0), 0);
  };

  const renderAdmin = () => renderAdminPanel();

  const render = () => {
    if (!currentUser) { showLogin(); return; }
    updateDrawerMenu();
    renderDesktopSidebar();
    renderNotificationBell();
    const map = {
      home: renderHome,
      orders: renderOrders,
      department: renderDepartment,
      materials: renderMaterials,
      finance: renderFinance,
      reports: renderReports,
      hr: renderHR,
      settings: renderSettings,
      admin: renderAdmin
    };
    try {
      (map[view] || renderHome)();
    } catch (err) {
      console.error('Render hatası:', err);
      elements.viewRoot.innerHTML = `
        <section class="card" style="margin-top:12px;">
          <div class="cardHead"><div class="h">${icon("warning")} Ekran yüklenemedi</div></div>
          <div class="cardBody">
            <div class="noteBox">${esc(err?.message || 'Bilinmeyen hata')}</div>
            <div class="row" style="margin-top:12px;">
              <button class="btn primary" id="btnRenderRetry">Tekrar Dene</button>
              <button class="btn" id="btnRenderHome">Genel Özet</button>
            </div>
          </div>
        </section>`;
      document.getElementById('btnRenderRetry')?.addEventListener('click', () => render());
      document.getElementById('btnRenderHome')?.addEventListener('click', () => { view = 'home'; render(); syncNavState(); });
    }
  };

  const syncNavState = () => {
    [elements.navHome, elements.navOrders, elements.navDept, elements.navFinance].forEach(el => el && el.classList.remove('active'));
    const activeMap = { home: elements.navHome, orders: elements.navOrders, department: elements.navDept, finance: elements.navFinance };
    activeMap[view]?.classList.add('active');

    if (elements.navHome) elements.navHome.style.display = canAccessView('home') ? '' : 'none';
    if (elements.navOrders) elements.navOrders.style.display = canAccessView('orders') ? '' : 'none';
    if (elements.navFinance) elements.navFinance.style.display = canAccessView('finance') ? '' : 'none';
  };

  const setView = (nextView) => {
    view = nextView || 'home';
    closeDrawer();
    render();
    syncNavState();
  };

  const showLogin = () => {
    lockScroll(false);
    elements.viewRoot.innerHTML = `
      <section class="card" style="max-width:420px;margin:24px auto;">
        <div class="cardHead"><div class="h">${icon("admin")} Giriş Yap</div></div>
        <div class="cardBody">
          <div class="fieldGrid">
            <div><label>Kullanıcı Adı</label><input class="input" id="loginUser" placeholder="Kullanıcı adınız"></div>
            <div><label>Şifre</label><input class="input" id="loginPass" type="password" placeholder="Şifrenizi girin"></div>
          </div>
          <button class="btn primary" id="btnDoLogin" style="width:100%;">Giriş Yap</button>
        </div>
      </section>`;
    document.getElementById('btnDoLogin').onclick = async () => {
      const username = document.getElementById('loginUser').value.trim();
      const password = document.getElementById('loginPass').value.trim();
      if (!username || !password) { toast('Kullanıcı adı ve şifre gerekli.'); return; }
      try {
        if (window.RoomsAPI?.login) {
          const loggedIn = await RoomsAPI.login(username, password);
          currentUser = normalizeUser(loggedIn);
          currentLanguage = currentUser.language || 'tr';
          document.body.dir = currentLanguage === 'ar' ? 'rtl' : 'ltr';
          localStorage.setItem('roys_current_user', JSON.stringify(currentUser));
          await bootstrapFromApi({ silent: true });
          if (currentUser.department) activeDept = mapStatusToDeptKey(currentUser.department) || currentUser.department;
          setView(currentUser.role === 'Üretim' ? 'department' : 'home');
          if (currentUser.forcePasswordChange) setTimeout(() => { openProfileModal(); toast('İlk giriş için şifrenizi değiştirin.'); }, 150);
          else toast('Giriş başarılı.');
          return;
        }
        const hashedPw = await hashPassword(password);
        const found = users.find(u => u.username === username && u.password === hashedPw);
        if (!found) { toast('Hatalı kullanıcı adı veya şifre.'); return; }
        currentUser = normalizeUser(found);
        currentLanguage = currentUser.language || 'tr';
        document.body.dir = currentLanguage === 'ar' ? 'rtl' : 'ltr';
        localStorage.setItem('roys_current_user', JSON.stringify(currentUser));
        if (currentUser.department) activeDept = mapStatusToDeptKey(currentUser.department) || currentUser.department;
        setView(currentUser.role === 'Üretim' ? 'department' : 'home');
        if (currentUser.forcePasswordChange) setTimeout(() => { openProfileModal(); toast('İlk giriş için şifrenizi değiştirin.'); }, 150);
      } catch (err) {
        toast(err?.message || 'Giriş başarısız.');
      }
    };
  };

  const logout = async () => {
    try { if (window.RoomsAPI?.logout) await RoomsAPI.logout(); } catch {}
    currentUser = null;
    localStorage.removeItem('roys_current_user');
    closeDrawer();
    showLogin();
  };

  const openProfileModal = () => {
    if (!currentUser) return;
    const html = `
      <div class="profileCard">
        <div class="profileAvatar">${icon('user')}</div>
        <div>
          <div class="profileName">${esc(currentUser.username)}</div>
          <div class="profileRole">${esc(getRoleBadge())}</div>
          <div class="profileRole" style="margin-top:4px;">Dil: ${currentUser.language === 'ar' ? 'العربية' : 'Türkçe'}</div>
        </div>
      </div>
      <div class="profileSection">
        <h3>${icon('settings')} Şifre Değiştir</h3>
        <div style="display:grid;gap:10px;">
          <div><label>Mevcut Şifre</label><input class="input" type="password" id="profileCurrentPw" placeholder="Mevcut şifreniz"></div>
          <div><label>Yeni Şifre</label><input class="input" type="password" id="profileNewPw" placeholder="En az 6 karakter"></div>
          <div><label>Yeni Şifre (Tekrar)</label><input class="input" type="password" id="profileNewPw2" placeholder="Şifreyi tekrar girin"></div>
        </div>
        <button class="btn primary" id="btnChangePassword" style="margin-top:12px;">${icon('save')} Şifreyi Güncelle</button>
      </div>
      <div class="profileSection">
        <button class="btn danger" id="btnLogoutProfile" style="width:100%;">${icon('logout')} Çıkış Yap</button>
      </div>
    `;
    openModal('Profilim', html);
    document.getElementById('btnChangePassword').onclick = async () => {
      const currentPw = document.getElementById('profileCurrentPw').value;
      const newPw = document.getElementById('profileNewPw').value;
      const newPw2 = document.getElementById('profileNewPw2').value;
      if (!currentPw || !newPw) return toast('Tüm alanları doldurun.');
      if (newPw.length < 6) return toast('Yeni şifre en az 6 karakter olmalı.');
      if (newPw !== newPw2) return toast('Şifreler eşleşmiyor.');
      try {
        if (window.RoomsAPI?.changePassword) {
          await RoomsAPI.changePassword(currentPw, newPw);
          closeModal();
          toast('Şifre başarıyla güncellendi.');
          return;
        }
      } catch (err) {
        return toast(err?.message || 'Şifre değiştirilemedi.');
      }
      const hashedCurrent = await hashPassword(currentPw);
      const userInStore = users.find(u => u.id === currentUser.id);
      if (!userInStore || userInStore.password !== hashedCurrent) return toast('Mevcut şifre hatalı.');
      userInStore.password = await hashPassword(newPw);
      userInStore.forcePasswordChange = false;
      currentUser.forcePasswordChange = false;
      localStorage.setItem('roys_current_user', JSON.stringify(currentUser));
      saveUsers();
      closeModal();
      toast('Şifre başarıyla güncellendi.');
    };
    document.getElementById('btnLogoutProfile').onclick = async () => { closeModal(); await logout(); };
  };

  const bootstrapFromApi = async ({ silent = false } = {}) => {
    if (!window.RoomsAPI || !localStorage.getItem('rooms_jwt')) return false;
    try {
      const [me, remoteState, remoteUsers, remoteRoleTemplates, remoteNotifications] = await Promise.all([
        RoomsAPI.me(),
        window.__apiLoadState ? window.__apiLoadState() : Promise.resolve(null),
        RoomsAPI.users.list().catch(() => []),
        RoomsAPI.users.getRoleTemplates().catch(() => null),
        RoomsAPI.notifications.list().catch(() => [])
      ]);
      window.__BOOTSTRAP_USERS__ = remoteUsers;
      window.__BOOTSTRAP_ROLE_TEMPLATES__ = remoteRoleTemplates;
      window.__BOOTSTRAP_NOTIFICATIONS__ = remoteNotifications;
      currentUser = normalizeUser(me);
      currentLanguage = currentUser.language || 'tr';
      document.body.dir = currentLanguage === 'ar' ? 'rtl' : 'ltr';
      localStorage.setItem('roys_current_user', JSON.stringify(currentUser));
      if (remoteState && typeof remoteState === 'object') {
        state = { ...state, ...remoteState };
        state.orders = (state.orders || []).map(normalizeOrderRecord);
        completedTasks = state.completedTasks || [];
        acceptedTasks = state.acceptedTasks || [];
        state.acceptedTasks = acceptedTasks;
        localStorage.setItem(CONSTANTS.LS_KEY, JSON.stringify({ ...state, completedTasks, acceptedTasks }));
      }
      if (remoteUsers.length) {
        users = remoteUsers.map(normalizeUser);
        localStorage.setItem(CONSTANTS.USERS_KEY, JSON.stringify(users));
      }
      if (remoteRoleTemplates) {
        roleTemplates = mergePermissionTemplates(remoteRoleTemplates);
        localStorage.setItem(ROLE_STORAGE_KEY, JSON.stringify(roleTemplates));
      }
      if (remoteNotifications.length || Array.isArray(remoteNotifications)) {
        notifications = remoteNotifications;
        localStorage.setItem(notificationsKey, JSON.stringify(notifications.slice(0, 250)));
      }
      if (!silent) toast('Sunucu verileri yüklendi.');
      updateDrawerMenu();
      renderDesktopSidebar();
      render();
      syncNavState();
      return true;
    } catch (err) {
      console.warn('API bootstrap başarısız:', err?.message || err);
      if (!silent) toast('Sunucuya bağlanılamadı, önbellek verisi kullanılıyor.');
      return false;
    }

  }

  const bootApp = async () => {

    updateDrawerMenu();

      syncNavState();

  document.getElementById('btnMenu').onclick = openDrawer;

  document.getElementById('navDept').onclick = () => setView('department');

      markAllNotificationsRead();

  }
  if (elements.notifPanel) {
    elements.notifPanel.onclick = (e) => e.stopPropagation();
  }
  document.addEventListener('click', (e) => {
    if (!elements.notifPanel || !elements.btnNotifications) return;
    const target = e.target;
    if (elements.notifPanel.classList.contains('show') && !elements.notifPanel.contains(target) && !elements.btnNotifications.contains(target)) {
      elements.notifPanel.classList.remove('show');
    }
  });
  window.addEventListener('online', () => { if (currentUser) bootstrapFromApi({ silent: true }); });
})();
</script>
</body>
</html>
