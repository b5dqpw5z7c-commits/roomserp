<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>ROOM'S ERP Cloud</title>
  <style>
    :root{--brand:#0A5C5C;--brand2:#0F7A7A;--bg:#f7fbf8;--card:#fff;--ink:#111827;--muted:#6b7280;--line:#e5e7eb;--danger:#dc2626;--success:#059669;--warning:#d97706;--info:#2563eb;--shadow:0 12px 32px rgba(17,24,39,.08)}
    *{box-sizing:border-box} body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif;background:radial-gradient(circle at top left,rgba(10,92,92,.12),transparent 28%),var(--bg);color:var(--ink)}
    .shell{min-height:100vh;display:grid;grid-template-columns:260px 1fr}.side{background:rgba(255,255,255,.92);border-right:1px solid var(--line);padding:18px;position:sticky;top:0;height:100vh;overflow:auto}.brand{font-weight:900;letter-spacing:-.03em;font-size:20px;margin-bottom:4px}.sub,.muted{color:var(--muted);font-size:12px}.nav{display:grid;gap:8px;margin-top:22px}.nav button{border:1px solid var(--line);background:#fff;border-radius:14px;padding:12px;text-align:left;font-weight:750;cursor:pointer}.nav button.active{background:#e6f3f3;color:var(--brand);border-color:rgba(10,92,92,.22)}.main{padding:24px;max-width:1280px;width:100%;margin:auto}.top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:18px}.card{background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:0 1px 2px rgba(17,24,39,.04);padding:18px;margin-bottom:16px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px}.metric b{display:block;font-size:28px}.metric span{color:var(--muted);font-size:13px}.row{display:flex;gap:10px;flex-wrap:wrap}.btn{border:1px solid var(--line);background:#fff;border-radius:12px;padding:10px 14px;font-weight:750;cursor:pointer;display:inline-flex;align-items:center;gap:6px}.btn.primary{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;border:0}.btn.danger{color:var(--danger);border-color:rgba(220,38,38,.22)}.btn.success{color:var(--success);border-color:rgba(5,150,105,.25);background:rgba(5,150,105,.06)}.btn.warn{color:var(--warning);border-color:rgba(217,119,6,.25);background:rgba(217,119,6,.06)}.btn.small{padding:7px 10px;font-size:12px}.btn:disabled{opacity:.55;cursor:not-allowed}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:11px 12px;font:inherit;background:#fff}.field{display:grid;gap:6px}.field label{font-size:12px;font-weight:800;color:var(--muted)}.formGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}table{width:100%;border-collapse:collapse;background:#fff;border-radius:16px;overflow:hidden}th,td{padding:12px;border-bottom:1px solid var(--line);text-align:left;font-size:14px;vertical-align:top}th{background:#f8fafc;color:#374151}.pill{display:inline-flex;border-radius:999px;padding:5px 10px;font-size:12px;font-weight:800;background:#e6f3f3;color:var(--brand)}.pill.red{background:#fee2e2;color:#991b1b}.pill.green{background:#dcfce7;color:#166534}.pill.blue{background:#dbeafe;color:#1d4ed8}.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#111827;color:white;padding:12px 18px;border-radius:999px;display:none;z-index:10}.toast.show{display:block}.login{max-width:420px;margin:10vh auto}.hidden{display:none!important}.dangerText{color:var(--danger)}.okText{color:var(--success)}.scroll{overflow:auto}.actions{display:flex;gap:6px;flex-wrap:wrap}.notice{border:1px dashed rgba(10,92,92,.25);background:#f1f8f8;color:#064242;border-radius:14px;padding:12px;margin-bottom:14px;font-size:13px}.split{display:grid;grid-template-columns:1fr 1fr;gap:14px}@media(max-width:820px){.shell{display:block}.side{height:auto;position:relative}.nav{grid-template-columns:repeat(2,1fr)}.main{padding:14px}.top{flex-direction:column}.split{grid-template-columns:1fr}th,td{font-size:12px;padding:9px}.actions .btn{flex:1 1 auto}}
  </style>
</head>
<body>
  <div id="login" class="login card">
    <div class="brand">ROOM'S ERP Cloud</div>
    <p class="muted">Bulut tabanlı operasyon, üretim, cari, kasa ve personel paneli.</p>
    <div class="formGrid" style="grid-template-columns:1fr">
      <div class="field"><label>Kullanıcı adı</label><input id="loginUser" value="admin" autocomplete="username"></div>
      <div class="field"><label>Şifre</label><input id="loginPass" type="password" placeholder="İlk kurulum şifreniz" autocomplete="current-password"></div>
      <button class="btn primary" onclick="login()">Giriş Yap</button>
      <small class="muted">İlk girişten sonra şifre değiştirmeniz gerekir.</small>
    </div>
  </div>
  <div id="app" class="shell hidden">
    <aside class="side">
      <div class="brand">ROOM'S ERP</div><div class="sub" id="userLine"></div>
      <div class="nav" id="nav"></div>
      <hr style="border:0;border-top:1px solid var(--line);margin:18px 0">
      <button class="btn" onclick="openLegacy()">Eski görsel prototip</button>
      <button class="btn danger" onclick="logout()" style="margin-top:8px">Çıkış</button>
    </aside>
    <main class="main">
      <div class="top"><div><h1 id="title" style="margin:0">Genel Bakış</h1><div class="muted" id="subtitle">Canlı veritabanı ile çalışan Cloud MVP</div></div><div class="row" id="quick"></div></div>
      <div id="view"></div>
    </main>
  </div>
  <div class="toast" id="toast"></div>
<script>
const apiBase = '/api';
let token = localStorage.roomsToken || '';
let user = null;
let active = 'dashboard';
let cache = { customers: [], suppliers: [], materials: [], employees: [] };
const tabs = [['dashboard','Genel Bakış'],['orders','Siparişler'],['accounts','Cariler'],['suppliers','Tedarikçiler'],['inventory','Stok'],['purchases','Satın Alma'],['accounting','Kasa/Finans'],['hr','Personel'],['settings','Ayarlar']];
const productionStages = ['iskelet','beyazlama','konfeksiyon','doseme','montaj'];
const stageLabels = { iskelet:'İskelet', beyazlama:'Beyazlama', konfeksiyon:'Konfeksiyon', doseme:'Döşeme', montaj:'Montaj', depo:'Depo' };
const statusLabels = { 'siparis-alindi':'Sipariş Alındı', 'iskelette':'İskelet', 'beyazlamada':'Beyazlama', 'konfeksiyonda':'Konfeksiyon', 'dosemede':'Döşeme', 'montaj-paket':'Montaj', 'sevkiyata-hazir':'Depo/Sevkiyat', 'sevk-edildi':'Sevk Edildi' };
function $(id){ return document.getElementById(id); }
function val(id){ return ($(id)?.value ?? '').trim(); }
function numVal(id){ return Number(val(id) || 0); }
function esc(v){ return String(v ?? '').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;'); }
function attr(v){ return esc(v).replaceAll('`','&#096;'); }
function raw(html){ return { __raw: String(html ?? '') }; }
function cell(v){ return v && typeof v === 'object' && v.__raw !== undefined ? v.__raw : esc(v); }
function toast(m){ const t=$('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2800); }
function money(n){ return new Intl.NumberFormat('tr-TR',{style:'currency',currency:'TRY',maximumFractionDigits:0}).format(Number(n||0)); }
function fmtDate(d){ return d ? String(d).slice(0,10) : ''; }
function today(){ return new Date().toISOString().slice(0,10); }
function pill(text, cls=''){ return raw(`<span class="pill ${cls}">${esc(text)}</span>`); }
function table(headers, rows){ return `<div class="scroll"><table><thead><tr>${headers.map(h=>`<th>${esc(h)}</th>`).join('')}</tr></thead><tbody>${rows.length ? rows.map(r=>`<tr>${r.map(c=>`<td>${cell(c)}</td>`).join('')}</tr>`).join('') : `<tr><td colspan="${headers.length}" class="muted">Kayıt yok</td></tr>`}</tbody></table></div>`; }
async function api(path, opts={}){
  const r = await fetch(apiBase + path, { ...opts, headers:{ 'Content-Type':'application/json', ...(token?{Authorization:'Bearer '+token}:{}), ...(opts.headers||{}) } });
  const j = await r.json().catch(()=>({ok:false,message:'Yanıt okunamadı'}));
  if(!r.ok || j.ok === false) throw new Error(j.message || 'İşlem başarısız');
  return j;
}
async function safe(fn){ try { await fn(); } catch(e){ toast(e.message || 'İşlem başarısız'); } }
async function login(){ await safe(async()=>{ const j=await api('/auth/login',{method:'POST',body:JSON.stringify({username:val('loginUser'),password:val('loginPass')})}); token=j.token; user=j.user; localStorage.roomsToken=token; showApp(); toast('Giriş yapıldı'); if(user.mustChangePassword) openPasswordChange(); }); }
async function logout(){ try{ await api('/auth/logout',{method:'POST'}); }catch{} token=''; user=null; localStorage.removeItem('roomsToken'); $('app').classList.add('hidden'); $('login').classList.remove('hidden'); }
async function bootstrap(){ if(!token) return; try{ const j=await api('/auth/me'); user=j.user; showApp(); }catch{ localStorage.removeItem('roomsToken'); token=''; } }
function showApp(){ $('login').classList.add('hidden'); $('app').classList.remove('hidden'); $('userLine').textContent=`${user.name} · ${user.role}`; renderNav(); route(active); }
function renderNav(){ $('nav').innerHTML=tabs.map(([k,n])=>`<button class="${active===k?'active':''}" onclick="route('${k}')">${esc(n)}</button>`).join(''); }
function route(k){ active=k; renderNav(); $('title').textContent=tabs.find(t=>t[0]===k)?.[1]||''; $('quick').innerHTML=''; $('view').innerHTML='<div class="card muted">Yükleniyor...</div>'; ({dashboard,orders,accounts,suppliers,inventory,purchases,accounting,hr,settings}[k]||dashboard)().catch(e=>{ $('view').innerHTML=`<div class="card"><b>Hata</b><p class="dangerText">${esc(e.message)}</p></div>`; }); }
async function loadCustomers(){ const j=await api('/accounts?type=customer'); cache.customers=j.items||[]; return cache.customers; }
async function loadSuppliers(){ const j=await api('/accounts?type=supplier'); cache.suppliers=j.items||[]; return cache.suppliers; }
async function loadMaterials(){ const j=await api('/inventory/materials'); cache.materials=j.items||[]; return cache.materials; }
async function loadEmployees(){ const j=await api('/hr/employees'); cache.employees=j.items||[]; return cache.employees; }
function optionRows(items, label='Seçiniz'){ return `<option value="">${esc(label)}</option>` + items.map(i=>`<option value="${attr(i.id)}">${esc(i.name || i.username || i.code || i.id)}</option>`).join(''); }
async function dashboard(){ const [j,a]=await Promise.all([api('/reports/dashboard'), api('/accounting/summary')]); const d=j.dashboard; const s=a.summary; const cash=(s.cashByChannel||[]).reduce((t,c)=>t+Number(c.balance||0),0); $('view').innerHTML=`<div class="grid"><div class="card metric"><span>Aylık Satış</span><b>${money(d.accounting.sales)}</b></div><div class="card metric"><span>Aylık Alış</span><b>${money(d.accounting.purchases)}</b></div><div class="card metric"><span>Giderler</span><b>${money(d.accounting.expenses)}</b></div><div class="card metric"><span>Tahakkuk Kâr/Zarar</span><b>${money(d.accounting.profit)}</b></div><div class="card metric"><span>Net Kasa</span><b>${money(cash)}</b></div></div><div class="card"><h3>Sipariş Durumları</h3>${table(['Durum','Adet','Tutar'],(d.orders||[]).map(o=>[statusLabels[o.status]||o.status,o.count,money(o.total)]))}</div>`; }
async function orders(){ $('quick').innerHTML='<button class="btn primary" onclick="orderForm()">Yeni Sipariş</button>'; const j=await api('/orders?limit=100'); $('view').innerHTML=`<div class="card">${table(['No','Cari','Durum','Tutar','İşlem'],(j.items||[]).map(o=>[o.order_no,o.account_name||o.customer_name||'-',pill(statusLabels[o.status]||o.status),money(o.total_amount),raw(orderActions(o))]))}</div>`; }
function progressOf(o){ return o.stageProgress || o.stage_progress || {}; }
function firstIncompleteStage(o){ const p=progressOf(o); return productionStages.find(st=>!p[st]?.completedAt) || null; }
function orderActions(o){ if(o.status==='sevk-edildi') return '<span class="muted">Tamamlandı</span>'; const st=firstIncompleteStage(o); const p=progressOf(o); let html='<div class="actions">'; if(st){ if(!p[st]?.acceptedAt) html+=`<button class="btn small" onclick="acceptStage('${o.id}','${st}')">${stageLabels[st]} kabul</button>`; html+=`<button class="btn small success" onclick="completeStage('${o.id}','${st}')">${stageLabels[st]} tamamla</button>`; } else if(!o.warehouse_accepted_at){ html+=`<button class="btn small" onclick="warehouse('${o.id}')">Depoya al</button>`; } else { html+=`<button class="btn small primary" onclick="ship('${o.id}')">Sevk et</button>`; } return html+'</div>'; }
async function orderForm(){ const customers=await loadCustomers(); $('view').innerHTML=`<div class="card"><h3>Yeni Sipariş</h3><div class="formGrid"><div class="field"><label>Cari</label><select id="oAccount">${optionRows(customers,'Cari seç veya boş bırak')}</select></div><div class="field"><label>Müşteri adı</label><input id="oCustomer" placeholder="Cari yoksa elle gir"></div><div class="field"><label>Tutar</label><input id="oAmount" type="number" min="0"></div><div class="field"><label>Teslim tarihi</label><input id="oDue" type="date"></div><div class="field"><label>Adres</label><input id="oAddress"></div><div class="field"><label>Ürünler JSON</label><textarea id="oProducts">[]</textarea></div><div class="field"><label>Not</label><textarea id="oNotes"></textarea></div></div><p class="row"><button class="btn" onclick="orders()">Vazgeç</button><button class="btn primary" onclick="saveOrder()">Kaydet</button></p></div>`; }
async function saveOrder(){ await safe(async()=>{ let products=[]; try{products=JSON.parse(val('oProducts')||'[]')}catch{throw new Error('Ürünler JSON formatı bozuk')} await api('/orders',{method:'POST',body:JSON.stringify({customerAccountId:val('oAccount')||null,customerName:val('oCustomer')||null,totalAmount:numVal('oAmount'),dueDate:val('oDue')||null,deliveryAddress:val('oAddress')||null,notes:val('oNotes')||null,products})}); toast('Sipariş oluşturuldu'); await orders(); }); }
async function acceptStage(id,stage){ await safe(async()=>{ await api(`/orders/${id}/stages/${stage}/accept`,{method:'POST'}); toast('İş kabul edildi'); await orders(); }); }
async function completeStage(id,stage){ await safe(async()=>{ await api(`/orders/${id}/stages/${stage}/complete`,{method:'POST',body:JSON.stringify({points:0})}); toast('Aşama tamamlandı'); await orders(); }); }
async function warehouse(id){ await safe(async()=>{ await api(`/orders/${id}/warehouse-accept`,{method:'POST'}); toast('Depoya alındı'); await orders(); }); }
async function ship(id){ if(!confirm('Sipariş sevk edilsin mi? Cari tahakkuk otomatik işlenecek.')) return; await safe(async()=>{ await api(`/orders/${id}/ship`,{method:'POST'}); toast('Sevk edildi'); await orders(); }); }
async function accounts(){ await accountList('customer'); }
async function suppliers(){ await accountList('supplier'); }
async function accountList(type){ const j= type==='customer' ? await loadCustomers().then(items=>({items})) : await loadSuppliers().then(items=>({items})); $('quick').innerHTML=`<button class="btn primary" onclick="accountForm('${type}')">Yeni ${type==='customer'?'Cari':'Tedarikçi'}</button>`; $('view').innerHTML=`<div class="card">${table(['Kod','Ad','Telefon','Bakiye','İşlem'],(j.items||[]).map(a=>[a.code,a.name,a.phone||'-',money(a.balance),raw(accountActions(a,type))]))}</div>`; }
function accountActions(a,type){ return `<div class="actions"><button class="btn small" onclick="accountDetail('${a.id}','${type}')">Ekstre</button>${type==='customer'?`<button class="btn small success" onclick="collectionForm('${a.id}')">Tahsilat</button>`:`<button class="btn small warn" onclick="supplierInvoiceForm('${a.id}')">Fatura</button><button class="btn small danger" onclick="supplierPaymentForm('${a.id}')">Ödeme</button>`}</div>`; }
async function accountDetail(id,type){ const j=await api(`/accounts/${id}`); const a=j.item; $('title').textContent=a.name; $('quick').innerHTML=`<button class="btn" onclick="route('${type==='customer'?'accounts':'suppliers'}')">Listeye dön</button>`; $('view').innerHTML=`<div class="card"><h3>${esc(a.name)}</h3><div class="grid"><div><b>Bakiye</b><br>${money(a.balance)}</div><div><b>Telefon</b><br>${esc(a.phone||'-')}</div><div><b>Vergi No</b><br>${esc(a.tax_no||'-')}</div></div></div><div class="card"><h3>Ekstre</h3>${table(['Tarih','Tip','Belge','Açıklama','Tutar'],(j.transactions||[]).map(t=>[fmtDate(t.document_date),t.type,t.document_no||'-',t.description||'-',`${t.direction==='debit'?'+':'-'} ${money(t.amount)}`]))}</div>`; }
function accountForm(type){ $('view').innerHTML=`<div class="card"><h3>Yeni ${type==='customer'?'Cari':'Tedarikçi'}</h3><div class="formGrid"><div class="field"><label>Ad *</label><input id="aName"></div><div class="field"><label>Ünvan</label><input id="aTitle"></div><div class="field"><label>Telefon</label><input id="aPhone"></div><div class="field"><label>Vergi Dairesi</label><input id="aOffice"></div><div class="field"><label>Vergi No</label><input id="aTax"></div><div class="field"><label>Yetkili</label><input id="aPerson"></div><div class="field"><label>Adres</label><textarea id="aAddress"></textarea></div><div class="field"><label>İskonto %</label><input id="aDisc" type="number" value="0"></div></div><p class="row"><button class="btn" onclick="accountList('${type}')">Vazgeç</button><button class="btn primary" onclick="saveAccount('${type}')">Kaydet</button></p></div>`; }
async function saveAccount(type){ await safe(async()=>{ await api('/accounts',{method:'POST',body:JSON.stringify({type,name:val('aName'),title:val('aTitle')||null,phone:val('aPhone')||null,taxOffice:val('aOffice')||null,taxNo:val('aTax')||null,contactPerson:val('aPerson')||null,address:val('aAddress')||null,discountRate:numVal('aDisc')})}); toast('Kart açıldı'); await accountList(type); }); }
async function collectionForm(accountId=''){ const customers=await loadCustomers(); formSimple('Tahsilat / Müşteri Avansı','/accounting/customer-collection','accounts',customers,accountId,'Tahsilat Kaydet'); }
async function supplierInvoiceForm(accountId=''){ const suppliers=await loadSuppliers(); formSimple('Tedarikçi Faturası','/accounting/supplier-invoice','suppliers',suppliers,accountId,'Fatura Kaydet',true); }
async function supplierPaymentForm(accountId=''){ const suppliers=await loadSuppliers(); formSimple('Tedarikçi Ödemesi / Avans','/accounting/supplier-payment','suppliers',suppliers,accountId,'Ödeme Kaydet'); }
function formSimple(title,path,back,accounts,selected,label,withVat=false){ $('view').innerHTML=`<div class="card"><h3>${esc(title)}</h3><div class="formGrid"><div class="field"><label>Hesap</label><select id="fAccount">${optionRows(accounts)}</select></div><div class="field"><label>Tutar</label><input id="fAmount" type="number" min="0"></div>${withVat?'<div class="field"><label>KDV %</label><input id="fVat" type="number" value="20"></div>':''}<div class="field"><label>Kanal</label><select id="fChannel"><option value="cash">Nakit</option><option value="bank">Banka</option><option value="pos">POS</option></select></div><div class="field"><label>Belge No</label><input id="fDoc"></div><div class="field"><label>Tarih</label><input id="fDate" type="date" value="${today()}"></div><div class="field"><label>Açıklama</label><input id="fDesc"></div></div><p class="row"><button class="btn" onclick="route('${back}')">Vazgeç</button><button class="btn primary" onclick="postSimple('${path}','${back}',${withVat?'true':'false'})">${esc(label)}</button></p></div>`; if(selected) $('fAccount').value=selected; }
async function postSimple(path,back,withVat=false){ await safe(async()=>{ await api(path,{method:'POST',body:JSON.stringify({accountId:val('fAccount'),amount:numVal('fAmount'),channel:val('fChannel')||'cash',documentNo:val('fDoc')||null,documentDate:val('fDate')||today(),description:val('fDesc')||null,vatRate:withVat?numVal('fVat'):0})}); toast('İşlem kaydedildi'); route(back); }); }
async function inventory(){ $('quick').innerHTML='<button class="btn primary" onclick="materialForm()">Yeni Malzeme</button><button class="btn" onclick="stockEntryForm()">Stok Girişi</button><button class="btn" onclick="inventoryMovements()">Hareketler</button>'; const j=await loadMaterials().then(items=>({items})); $('view').innerHTML=`<div class="card">${table(['Malzeme','Kategori','Birim','Varyant/Stok'],(j.items||[]).map(m=>[m.name,m.category||'-',m.unit,raw((m.variants||[]).map(v=>`${esc(v.name)}: ${esc(v.stock)}`).join('<br>')||'-')]))}</div>`; }
function materialForm(){ $('view').innerHTML=`<div class="card"><h3>Yeni Malzeme</h3><div class="formGrid"><div class="field"><label>Ad</label><input id="mName"></div><div class="field"><label>Kategori</label><input id="mCat"></div><div class="field"><label>Birim</label><input id="mUnit" value="adet"></div><div class="field"><label>Kritik seviye</label><input id="mCrit" type="number" value="0"></div><div class="field"><label>İlk Varyant</label><input id="mVar" value="Standart"></div><div class="field"><label>Stok</label><input id="mStock" type="number" value="0"></div></div><p class="row"><button class="btn" onclick="inventory()">Vazgeç</button><button class="btn primary" onclick="saveMaterial()">Kaydet</button></p></div>`; }
async function saveMaterial(){ await safe(async()=>{ await api('/inventory/materials',{method:'POST',body:JSON.stringify({name:val('mName'),category:val('mCat')||null,unit:val('mUnit')||'adet',criticalLevel:numVal('mCrit'),variants:[{name:val('mVar')||'Standart',stock:numVal('mStock')}]})}); toast('Malzeme kaydedildi'); await inventory(); }); }
async function stockEntryForm(){ const mats=await loadMaterials(); $('view').innerHTML=`<div class="card"><h3>Stok Girişi</h3><div class="formGrid"><div class="field"><label>Malzeme</label><select id="seMat" onchange="refreshVariantSelect('seMat','seVar')">${optionRows(mats)}</select></div><div class="field"><label>Varyant</label><select id="seVar"></select></div><div class="field"><label>Miktar</label><input id="seQty" type="number" min="0"></div><div class="field"><label>Birim maliyet</label><input id="seCost" type="number" min="0"></div><div class="field"><label>Not</label><input id="seNote"></div></div><p class="row"><button class="btn" onclick="inventory()">Vazgeç</button><button class="btn primary" onclick="saveStockEntry()">Kaydet</button></p></div>`; refreshVariantSelect('seMat','seVar'); }
function refreshVariantSelect(matSelectId,varSelectId){ const mat=cache.materials.find(m=>m.id===val(matSelectId)); $(varSelectId).innerHTML=optionRows(mat?.variants||[], 'Varsayılan'); }
async function saveStockEntry(){ await safe(async()=>{ await api('/inventory/stock-entry',{method:'POST',body:JSON.stringify({materialId:val('seMat'),variantId:val('seVar')||null,qty:numVal('seQty'),unitCost:numVal('seCost'),note:val('seNote')||null})}); toast('Stok girişi kaydedildi'); await inventory(); }); }
async function inventoryMovements(){ const j=await api('/inventory/movements?limit=100'); $('view').innerHTML=`<div class="card"><h3>Stok Hareketleri</h3>${table(['Tarih','Malzeme','Varyant','Tip','Miktar'],(j.items||[]).map(x=>[fmtDate(x.created_at),x.material_name||'-',x.variant_name||'-',x.type,`${x.direction==='in'?'+':'-'}${x.qty}`]))}</div>`; }
async function purchases(){ $('quick').innerHTML='<button class="btn primary" onclick="purchaseForm()">Yeni Satın Alma</button>'; const j=await api('/purchases?limit=100'); $('view').innerHTML=`<div class="card">${table(['Tarih','Tedarikçi','Belge','Toplam','Ödeme'],(j.items||[]).map(p=>[fmtDate(p.document_date),p.supplier_name||'-',p.document_no||'-',money(p.gross_amount),p.payment_status]))}</div>`; }
async function purchaseForm(){ const [sup,mats]=await Promise.all([loadSuppliers(),loadMaterials()]); $('view').innerHTML=`<div class="card"><h3>Yeni Satın Alma</h3>${sup.length&&mats.length?'':'<div class="notice">Satın alma için önce tedarikçi ve malzeme tanımlanmalı.</div>'}<div class="formGrid"><div class="field"><label>Tedarikçi</label><select id="puSup">${optionRows(sup)}</select></div><div class="field"><label>Belge No</label><input id="puDoc"></div><div class="field"><label>Tarih</label><input id="puDate" type="date" value="${today()}"></div><div class="field"><label>KDV %</label><input id="puVat" type="number" value="20"></div><div class="field"><label>Malzeme</label><select id="puMat" onchange="refreshVariantSelect('puMat','puVar')">${optionRows(mats)}</select></div><div class="field"><label>Varyant</label><select id="puVar"></select></div><div class="field"><label>Miktar</label><input id="puQty" type="number" value="1"></div><div class="field"><label>Birim maliyet</label><input id="puCost" type="number" value="0"></div><div class="field"><label>Peşin ödendi</label><select id="puPay"><option value="false">Hayır</option><option value="true">Evet</option></select></div><div class="field"><label>Kanal</label><select id="puCh"><option value="cash">Nakit</option><option value="bank">Banka</option><option value="pos">POS</option></select></div></div><p class="row"><button class="btn" onclick="purchases()">Vazgeç</button><button class="btn primary" onclick="savePurchase()">Kaydet</button></p></div>`; refreshVariantSelect('puMat','puVar'); }
async function savePurchase(){ await safe(async()=>{ await api('/purchases',{method:'POST',body:JSON.stringify({supplierId:val('puSup'),documentNo:val('puDoc')||null,documentDate:val('puDate')||today(),vatRate:numVal('puVat'),payNow:val('puPay')==='true',channel:val('puCh')||'cash',items:[{materialId:val('puMat'),variantId:val('puVar')||null,qty:numVal('puQty'),unitCost:numVal('puCost'),vatRate:numVal('puVat')}]})}); toast('Satın alma işlendi'); await purchases(); }); }
async function accounting(){ $('quick').innerHTML='<button class="btn primary" onclick="expenseForm()">Yeni Gider</button><button class="btn" onclick="collectionForm()">Tahsilat</button><button class="btn" onclick="supplierPaymentForm()">Tedarikçi Ödeme</button><button class="btn" onclick="cashTransferForm()">Virman</button>'; const [s,c]=await Promise.all([api('/accounting/summary'),api('/accounting/cashbook?limit=100')]); const a=s.summary; $('view').innerHTML=`<div class="grid"><div class="card metric"><span>Satış</span><b>${money(a.monthlySales)}</b></div><div class="card metric"><span>Alış</span><b>${money(a.monthlyPurchases)}</b></div><div class="card metric"><span>Gider</span><b>${money(a.monthlyExpenses)}</b></div><div class="card metric"><span>Kâr/Zarar</span><b>${money(a.accrualProfit)}</b></div></div><div class="card"><h3>Kasa Kanalları</h3>${table(['Kanal','Bakiye'],(a.cashByChannel||[]).map(x=>[x.channel,money(x.balance)]))}</div><div class="card"><h3>Kasa Defteri</h3>${table(['Tarih','Akış','Kanal','Tutar','Açıklama'],(c.items||[]).map(x=>[fmtDate(x.document_date),x.flow,x.target_channel?`${x.channel} → ${x.target_channel}`:x.channel,money(x.amount),x.description||'']))}</div>`; }
function expenseForm(){ $('view').innerHTML=`<div class="card"><h3>Gider / Masraf</h3><div class="formGrid"><div class="field"><label>Başlık</label><input id="xTitle"></div><div class="field"><label>Kategori</label><input id="xCat" value="Genel"></div><div class="field"><label>Tutar</label><input id="xAmount" type="number"></div><div class="field"><label>KDV %</label><input id="xVat" type="number" value="0"></div><div class="field"><label>Kanal</label><select id="xChannel"><option value="cash">Nakit</option><option value="bank">Banka</option><option value="pos">POS</option></select></div><div class="field"><label>Ödeme durumu</label><select id="xPaid"><option value="paid">Ödendi</option><option value="unpaid">Ödenmedi</option></select></div><div class="field"><label>Belge No</label><input id="xDoc"></div><div class="field"><label>Tarih</label><input id="xDate" type="date" value="${today()}"></div><div class="field"><label>Açıklama</label><input id="xDesc"></div></div><p class="row"><button class="btn" onclick="accounting()">Vazgeç</button><button class="btn primary" onclick="saveExpense()">Kaydet</button></p></div>`; }
async function saveExpense(){ await safe(async()=>{ await api('/accounting/expense',{method:'POST',body:JSON.stringify({title:val('xTitle'),category:val('xCat')||'Genel',amount:numVal('xAmount'),vatRate:numVal('xVat'),channel:val('xChannel')||'cash',paymentStatus:val('xPaid')||'paid',documentNo:val('xDoc')||null,documentDate:val('xDate')||today(),description:val('xDesc')||null})}); toast('Gider işlendi'); await accounting(); }); }
function cashTransferForm(){ $('view').innerHTML=`<div class="card"><h3>Kasa/Banka Virmanı</h3><div class="formGrid"><div class="field"><label>Kaynak</label><select id="trFrom"><option value="cash">Nakit</option><option value="bank">Banka</option><option value="pos">POS</option></select></div><div class="field"><label>Hedef</label><select id="trTo"><option value="bank">Banka</option><option value="cash">Nakit</option><option value="pos">POS</option></select></div><div class="field"><label>Tutar</label><input id="trAmount" type="number"></div><div class="field"><label>Tarih</label><input id="trDate" type="date" value="${today()}"></div><div class="field"><label>Açıklama</label><input id="trDesc"></div></div><p class="row"><button class="btn" onclick="accounting()">Vazgeç</button><button class="btn primary" onclick="saveTransfer()">Virman Yap</button></p></div>`; }
async function saveTransfer(){ await safe(async()=>{ await api('/accounting/cash-transfer',{method:'POST',body:JSON.stringify({fromChannel:val('trFrom'),toChannel:val('trTo'),amount:numVal('trAmount'),documentDate:val('trDate')||today(),description:val('trDesc')||null})}); toast('Virman işlendi'); await accounting(); }); }
async function hr(){ $('quick').innerHTML='<button class="btn primary" onclick="employeeForm()">Yeni Personel</button><button class="btn" onclick="attendanceScan()">Kapı QR Okut</button>'; const employees=await loadEmployees(); $('view').innerHTML=`<div class="card">${table(['Ad','Departman','Maaş','Hedef','İşlem'],employees.map(e=>[e.name,e.department,money(e.salary),`${e.weekly_target}/${e.monthly_target}`,raw(`<div class="actions"><button class="btn small" onclick="payrollForm('${e.id}')">Maaş</button><button class="btn small warn" onclick="employeePaymentForm('${e.id}','advance')">Avans</button><button class="btn small" onclick="employeePaymentForm('${e.id}','payment')">Ödeme</button></div>`)]))}</div>`; }
function employeeForm(){ $('view').innerHTML=`<div class="card"><h3>Yeni Personel</h3><div class="formGrid"><div class="field"><label>Ad</label><input id="eName"></div><div class="field"><label>Departman</label><input id="eDept"></div><div class="field"><label>Görev</label><input id="eRole"></div><div class="field"><label>Maaş</label><input id="eSalary" type="number"></div><div class="field"><label>Haftalık hedef</label><input id="eWeekly" type="number" value="4500"></div><div class="field"><label>Aylık hedef</label><input id="eMonthly" type="number" value="18000"></div></div><p class="row"><button class="btn" onclick="hr()">Vazgeç</button><button class="btn primary" onclick="saveEmployee()">Kaydet</button></p></div>`; }
async function saveEmployee(){ await safe(async()=>{ await api('/hr/employees',{method:'POST',body:JSON.stringify({name:val('eName'),department:val('eDept'),role:val('eRole')||null,salary:numVal('eSalary'),weeklyTarget:numVal('eWeekly')||4500,monthlyTarget:numVal('eMonthly')||18000})}); toast('Personel kaydedildi'); await hr(); }); }
async function attendanceScan(){ const code=prompt('Kapı QR kodu'); if(!code) return; await safe(async()=>{ const j=await api('/hr/attendance-scan',{method:'POST',body:JSON.stringify({gateQr:code})}); toast(j.action==='check_in'?'Giriş yapıldı':'Çıkış yapıldı'); }); }
function employeePaymentForm(employeeId,type){ $('view').innerHTML=`<div class="card"><h3>${type==='advance'?'Personel Avansı':'Personel Ödemesi'}</h3><div class="formGrid"><div class="field"><label>Tutar</label><input id="epAmount" type="number"></div><div class="field"><label>Kanal</label><select id="epChannel"><option value="cash">Nakit</option><option value="bank">Banka</option></select></div><div class="field"><label>Belge No</label><input id="epDoc"></div><div class="field"><label>Tarih</label><input id="epDate" type="date" value="${today()}"></div><div class="field"><label>Açıklama</label><input id="epDesc"></div></div><p class="row"><button class="btn" onclick="hr()">Vazgeç</button><button class="btn primary" onclick="saveEmployeePayment('${employeeId}','${type}')">Kaydet</button></p></div>`; }
async function saveEmployeePayment(employeeId,type){ await safe(async()=>{ await api('/hr/employee-payment',{method:'POST',body:JSON.stringify({employeeId,type,amount:numVal('epAmount'),channel:val('epChannel'),documentNo:val('epDoc')||null,documentDate:val('epDate')||today(),description:val('epDesc')||null})}); toast('Personel işlemi kaydedildi'); await hr(); }); }
function payrollForm(employeeId){ const d=new Date(); $('view').innerHTML=`<div class="card"><h3>Maaş Hesaplama</h3><div class="formGrid"><div class="field"><label>Yıl</label><input id="prYear" type="number" value="${d.getFullYear()}"></div><div class="field"><label>Ay</label><input id="prMonth" type="number" value="${d.getMonth()+1}" min="1" max="12"></div><div class="field"><label>Kanal</label><select id="prChannel"><option value="cash">Nakit</option><option value="bank">Banka</option></select></div></div><p class="row"><button class="btn" onclick="hr()">Vazgeç</button><button class="btn" onclick="previewPayroll('${employeeId}')">Önizle</button><button class="btn primary" onclick="runPayroll('${employeeId}')">Maaş Öde</button></p><div id="payrollResult"></div></div>`; }
async function previewPayroll(employeeId){ await safe(async()=>{ const j=await api(`/hr/employees/${employeeId}/payroll-preview?year=${numVal('prYear')}&month=${numVal('prMonth')}`); const p=j.preview; $('payrollResult').innerHTML=`<div class="notice"><b>${esc(p.employee.name)}</b><br>Performans: ${esc(p.production.performancePct)}% · Puan: ${esc(p.production.totalPoints)} / ${esc(p.production.monthlyTarget)}<br>Performans kesinti: ${money(p.deductions.performanceDeduction)} · Puantaj kesinti: ${money(p.deductions.attendancePenaltyDeduction)} · Avans: ${money(p.deductions.totalAdvance)}<br><b>Net maaş: ${money(p.calculation.netSalary)}</b>${p.alreadyPaid?'<br><span class="dangerText">Bu dönem maaşı ödenmiş.</span>':''}</div>`; }); }
async function runPayroll(employeeId){ if(!confirm('Bu dönem için backend tarafından hesaplanan net maaş ödensin mi?')) return; await safe(async()=>{ await api(`/hr/employees/${employeeId}/payroll-run`,{method:'POST',body:JSON.stringify({year:numVal('prYear'),month:numVal('prMonth'),channel:val('prChannel')})}); toast('Maaş ödendi'); await hr(); }); }
async function settings(){ const j=await api('/settings'); $('view').innerHTML=`<div class="split"><div class="card"><h3>Ayarlar</h3><pre style="white-space:pre-wrap">${esc(JSON.stringify(j.settings,null,2))}</pre></div><div class="card"><h3>Ayar Güncelle</h3><div class="field"><label>Ayar anahtarı</label><select id="setKey">${Object.keys(j.settings).map(k=>`<option value="${attr(k)}">${esc(k)}</option>`).join('')}</select></div><div class="field"><label>JSON değer</label><textarea id="setVal" rows="8">${esc(JSON.stringify(j.settings[Object.keys(j.settings)[0]]||{},null,2))}</textarea></div><p><button class="btn primary" onclick="saveSetting()">Kaydet</button></p></div></div>`; $('setKey').addEventListener('change',()=>{$('setVal').value=JSON.stringify(j.settings[val('setKey')]||{},null,2)}); }
async function saveSetting(){ await safe(async()=>{ let body; try{body=JSON.parse(val('setVal'))}catch{throw new Error('JSON formatı bozuk')} await api(`/settings/${encodeURIComponent(val('setKey'))}`,{method:'PUT',body:JSON.stringify(body)}); toast('Ayar kaydedildi'); await settings(); }); }
function openPasswordChange(){ $('title').textContent='Şifre Değiştir'; $('quick').innerHTML=''; $('view').innerHTML=`<div class="card"><h3>İlk giriş: şifre değiştir</h3><div class="formGrid"><div class="field"><label>Mevcut şifre</label><input id="pOld" type="password"></div><div class="field"><label>Yeni şifre</label><input id="pNew" type="password"></div></div><p><button class="btn primary" onclick="changePassword()">Şifreyi Değiştir</button></p></div>`; active='settings'; renderNav(); }
async function changePassword(){ await safe(async()=>{ await api('/auth/change-password',{method:'POST',body:JSON.stringify({currentPassword:val('pOld'),newPassword:val('pNew')})}); toast('Şifre değişti'); user.mustChangePassword=false; route('dashboard'); }); }
function openLegacy(){ location.href='/legacy-phase3.html'; }
bootstrap();
</script>
</body>
</html>
